/* ── DocumentsView ───────────────────────────────────── */
function DocumentsView({projects,onOpen,onUpdate}){
  const [selId,setSelId]=useState(projects[0]?.id||null);
  const proj=projects.find(p=>p.id===selId);
  const allIdx=proj?POMS_STAGES.findIndex(s=>s.id===proj.stage):-1;
  const relStages=allIdx>=0?POMS_STAGES.slice(0,allIdx+1):[];
  const reqTotal=relStages.reduce((a,s)=>a+(STAGE_DOCS[s.id]||[]).filter(d=>d.required).length,0);
  const reqDone=relStages.reduce((a,s)=>a+(STAGE_DOCS[s.id]||[]).filter(d=>d.required&&(proj?.docs||{})[s.id+'_'+d.id]==='done').length,0);
  function setDocStatus(sid,did,val){onUpdate(proj.id,{docs:{...(proj.docs||{}),[sid+'_'+did]:val}});}
  const sc={done:'var(--green)',pending:'var(--amber)',missing:'var(--red)'};
  return(
    <div style={{display:'flex',gap:20,height:'calc(100vh - 130px)'}}>
      <div style={{width:260,flexShrink:0,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--r2)',overflow:'hidden',display:'flex',flexDirection:'column'}}>
        <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border)',fontSize:11,fontWeight:600,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.04em'}}>프로젝트 선택</div>
        <div style={{flex:1,overflowY:'auto'}}>
          {projects.length===0&&<div style={{padding:'16px',color:'var(--text3)',fontSize:12,textAlign:'center'}}>없음</div>}
          {projects.map(p=>{
            const psi=stageInfo(p.stage);const ppc=phaseColor(psi.phase);
            const pi=POMS_STAGES.findIndex(s=>s.id===p.stage);
            const ps=pi>=0?POMS_STAGES.slice(0,pi+1):[];
            const pr=ps.reduce((a,s)=>a+(STAGE_DOCS[s.id]||[]).filter(d=>d.required).length,0);
            const pd=ps.reduce((a,s)=>a+(STAGE_DOCS[s.id]||[]).filter(d=>d.required&&(p.docs||{})[s.id+'_'+d.id]==='done').length,0);
            const pct=pr>0?Math.round((pd/pr)*100):0;
            return(
              <div key={p.id} onClick={()=>setSelId(p.id)} style={{padding:'10px 14px',borderBottom:'1px solid var(--border)',cursor:'pointer',background:selId===p.id?'var(--bg3)':'transparent',borderLeft:selId===p.id?'2px solid var(--accent)':'2px solid transparent'}}>
                <div style={{fontSize:12,fontWeight:600,marginBottom:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</div>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <span className="badge" style={{background:ppc+'18',color:ppc,border:'1px solid '+ppc+'25',fontSize:9,padding:'1px 5px'}}>{psi.label}</span>
                  <span style={{fontSize:10,color:pct===100?'var(--green)':'var(--text3)',marginLeft:'auto',fontFamily:"'DM Mono',monospace"}}>{pct}%</span>
                </div>
                <div style={{background:'var(--bg4)',borderRadius:2,height:2,marginTop:5}}>
                  <div style={{height:'100%',background:pct===100?'var(--green)':'var(--accent)',width:pct+'%',borderRadius:2}}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div style={{flex:1,overflow:'auto'}}>
        {!proj?<div style={{color:'var(--text3)',fontSize:13,padding:'40px',textAlign:'center'}}>왼쪽에서 프로젝트를 선택하세요</div>:(
          <div>
            <div style={{display:'flex',alignItems:'center',marginBottom:16}}>
              <div><div style={{fontSize:15,fontWeight:700}}>{proj.name}</div><div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>{proj.customer||'—'}</div></div>
              <div style={{marginLeft:'auto',textAlign:'center'}}>
                <div style={{fontSize:11,color:'var(--text2)',marginBottom:2}}>필수 서류 완료</div>
                <div style={{fontWeight:700,fontSize:16,color:reqDone===reqTotal?'var(--green)':'var(--amber)',fontFamily:"'DM Mono',monospace"}}>{reqDone}/{reqTotal}</div>
              </div>
            </div>
            {relStages.map(stage=>{
              const docs=STAGE_DOCS[stage.id]||[];if(!docs.length)return null;
              const spc=phaseColor(stage.phase);
              const sdone=docs.filter(d=>(proj.docs||{})[stage.id+'_'+d.id]==='done').length;
              return(
                <div key={stage.id} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--r2)',marginBottom:10,overflow:'hidden'}}>
                  <div style={{padding:'8px 14px',background:spc+'10',borderBottom:'1px solid '+spc+'25',display:'flex',alignItems:'center',gap:10}}>
                    <span className="badge" style={{background:spc+'22',color:spc,border:'1px solid '+spc+'35',fontSize:11}}>{stage.label}</span>
                    <span style={{fontSize:10,color:'var(--text3)',fontStyle:'italic'}}>{stage.en}</span>
                    {stage.id===proj.stage&&<span style={{fontSize:10,background:'var(--accent)',color:'#000',padding:'1px 6px',borderRadius:3,fontWeight:700}}>현재</span>}
                    <span style={{marginLeft:'auto',fontSize:11,color:sdone===docs.length?'var(--green)':'var(--text2)',fontFamily:"'DM Mono',monospace"}}>{sdone}/{docs.length}</span>
                  </div>
                  {docs.map(doc=>{
                    const key=stage.id+'_'+doc.id;const status=(proj.docs||{})[key];const c=sc[status]||'var(--text3)';
                    return(
                      <div key={doc.id} style={{display:'flex',alignItems:'center',gap:14,padding:'12px 16px',borderBottom:'1px solid var(--border)'}}>
                        <div style={{width:14,height:14,borderRadius:'50%',background:status==='done'?'var(--green)':'transparent',border:'2px solid '+(status==='done'?'var(--green)':'var(--border3)'),flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                          {status==='done'&&<span style={{fontSize:8,color:'#000',fontWeight:700}}>✓</span>}
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:14,fontWeight:500,display:'flex',alignItems:'center',gap:6}}>{doc.label}{doc.required&&<span style={{fontSize:9,color:'var(--red)',fontWeight:700}}>필수</span>}</div>
                          <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>{doc.owner} 담당</div>
                        </div>
                        <select value={status||''} onChange={e=>setDocStatus(stage.id,doc.id,e.target.value)} style={{width:90,fontSize:11,padding:'4px 8px',color:c,background:'var(--bg3)',border:'1px solid '+c+'40'}}>
                          <option value=''>—</option><option value='pending'>진행중</option><option value='done'>완료</option><option value='missing'>미제출</option>
                        </select>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}


/* ── TimelineView ────────────────────────────────────── */
function TimelineView({projects,onOpen}){
  const now=new Date();
  const [selM,setSelM]=useState(now.getMonth());
  const [selY,setSelY]=useState(now.getFullYear());
  const mn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const dim=new Date(selY,selM+1,0).getDate();
  const fd=new Date(selY,selM,1).getDay();
  const ms=`${selY}-${String(selM+1).padStart(2,'0')}`;
  const events=[];
  projects.forEach(p=>{
    (p.paySchedule||[]).forEach(ps=>{
      if(ps.date&&ps.date.slice(0,7)===ms)events.push({project:p,pay:ps,day:parseInt(ps.date.slice(8,10)),type:'pay'});
    });
    if(p.stageEnteredAt&&!['closeout','cancelled'].includes(p.stage)){
      const si=stageInfo(p.stage);const limit=si.days;
      const dl=new Date(new Date(p.stageEnteredAt).getTime()+limit*86400000);
      if(dl.getMonth()===selM&&dl.getFullYear()===selY)
        events.push({project:p,day:dl.getDate(),type:'deadline',label:si.label+' 기한'});
    }
  });
  const dayMap={};events.forEach(e=>{if(!dayMap[e.day])dayMap[e.day]=[];dayMap[e.day].push(e);});
  const upcoming=[];
  projects.forEach(p=>{
    (p.paySchedule||[]).forEach(ps=>{
      if(!ps.date)return;
      const diff=Math.floor((new Date(ps.date)-now)/86400000);
      if(diff>=0&&diff<=30)upcoming.push({project:p,pay:ps,diff});
    });
  });
  upcoming.sort((a,b)=>a.diff-b.diff);
  function prev(){let m=selM-1,y=selY;if(m<0){m=11;y--;}setSelM(m);setSelY(y);}
  function next(){let m=selM+1,y=selY;if(m>11){m=0;y++;}setSelM(m);setSelY(y);}
  return(
    <div style={{display:'flex',gap:24,width:'100%'}}>
      <div style={{flex:1}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
          <button className="btn ghost sm" onClick={prev}>‹</button>
          <div style={{fontSize:18,fontWeight:700,letterSpacing:'-.02em'}}>{selY}년 {mn[selM]}</div>
          <button className="btn ghost sm" onClick={next}>›</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:6,marginBottom:6}}>
          {['일','월','화','수','목','금','토'].map(d=><div key={d} style={{textAlign:'center',fontSize:13,color:'var(--text2)',fontWeight:600,padding:'6px'}}>{d}</div>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:6}}>
          {Array.from({length:fd}).map((_,i)=><div key={'e'+i}/>)}
          {Array.from({length:dim}).map((_,i)=>{
            const day=i+1;
            const isToday=day===now.getDate()&&selM===now.getMonth()&&selY===now.getFullYear();
            const evs=dayMap[day]||[];
            return(
              <div key={day} style={{minHeight:100,background:isToday?'var(--accent-dim)':evs.length>0?'var(--bg3)':'var(--bg2)',border:'1px solid '+(isToday?'var(--accent)':'var(--border)'),borderRadius:'var(--r)',padding:'6px 8px'}}>
                <div style={{fontSize:13,fontWeight:isToday?700:500,color:isToday?'var(--accent)':'var(--text)',marginBottom:3}}>{day}</div>
                {evs.slice(0,2).map((ev,ei)=>(
                  <div key={ei} onClick={()=>onOpen(ev.project)} style={{fontSize:10,padding:'3px 6px',borderRadius:3,marginBottom:2,cursor:'pointer',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',background:ev.type==='deadline'?'var(--red-dim)':ev.pay?.type==='선금'?'var(--amber-dim)':'var(--green-dim)',color:ev.type==='deadline'?'var(--red)':ev.pay?.type==='선금'?'var(--amber)':'var(--green)'}}>
                    {ev.type==='deadline'?ev.label:ev.pay?.type+' · '+ev.project.name}
                  </div>
                ))}
                {evs.length>2&&<div style={{fontSize:9,color:'var(--text3)'}}>+{evs.length-2}</div>}
              </div>
            );
          })}
        </div>
        <div style={{display:'flex',gap:14,marginTop:10,fontSize:11,color:'var(--text2)'}}>
          <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:8,height:8,background:'var(--amber)',borderRadius:1,display:'inline-block'}}/>선금</span>
          <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:8,height:8,background:'var(--green)',borderRadius:1,display:'inline-block'}}/>잔금/기타</span>
          <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:8,height:8,background:'var(--red)',borderRadius:1,display:'inline-block'}}/>단계 기한</span>
        </div>
      </div>
      <div style={{width:260,flexShrink:0}}>
        <div style={{fontSize:15,fontWeight:600,marginBottom:14}}>납기 임박 (30일 이내)</div>
        {upcoming.length===0?<div style={{color:'var(--text3)',fontSize:12}}>없음</div>
        :upcoming.map(({project:p,pay,diff},i)=>(
          <div key={i} onClick={()=>onOpen(p)} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'10px 12px',marginBottom:8,cursor:'pointer'}}
            onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'}
            onMouseLeave={e=>e.currentTarget.style.background='var(--bg2)'}>
            <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>{p.name}</div>
            <div style={{fontSize:13,color:'var(--text2)',marginBottom:6}}>{p.customer||'—'}</div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span className="badge" style={{background:pay.type==='선금'?'var(--amber-dim)':'var(--green-dim)',color:pay.type==='선금'?'var(--amber)':'var(--green)',fontSize:10}}>{pay.type}</span>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:16,fontWeight:700,color:diff<=7?'var(--red)':diff<=14?'var(--amber)':'var(--green)'}}>D-{diff}</span>
            </div>
            <div style={{fontSize:12,color:'var(--text3)',marginTop:5}}>{pay.date} · {fmtFull(pay.amount)}</div>
          </div>
        ))}
      </div>
    </div>
  );
}


/* ── TeamView ────────────────────────────────────────── */
function TeamView({projects,members,depts,onOpen}){
  const memberMap={};
  projects.forEach(p=>{
    Object.entries(p.assignments||{}).forEach(([sid,name])=>{
      if(!name)return;
      if(!memberMap[name])memberMap[name]={name,projects:[]};
      if(!memberMap[name].projects.find(pr=>pr.id===p.id))memberMap[name].projects.push(p);
    });
  });
  const unassigned=projects.filter(p=>!['closeout','cancelled'].includes(p.stage)&&!(p.assignments||{})[p.stage]);
  return(
    <div style={{display:'flex',flexDirection:'column',gap:24,width:'100%'}}>
      {unassigned.length>0&&(
        <div style={{background:'var(--amber-dim)',border:'1px solid #ffb80040',borderRadius:'var(--r2)',padding:'10px 14px'}}>
          <div style={{fontSize:14,fontWeight:700,color:'var(--amber)',marginBottom:10}}>⚠ 담당자 미배정 — {unassigned.length}건</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {unassigned.map(p=>{const si=stageInfo(p.stage);return(
              <div key={p.id} onClick={()=>onOpen(p)} style={{background:'rgba(0,0,0,.3)',borderRadius:'var(--r)',padding:'5px 10px',cursor:'pointer',fontSize:12}}>
                <span style={{fontWeight:600}}>{p.name}</span><span style={{marginLeft:6,color:'var(--amber)',fontSize:11}}>{si.label}</span>
              </div>
            );})}
          </div>
        </div>
      )}
      <div className="grid2">
        <div className="card">
          <div style={{fontSize:13,fontWeight:600,marginBottom:14}}>담당자별 프로젝트 현황</div>
          {Object.keys(memberMap).length===0?<div style={{color:'var(--text3)',fontSize:12}}>담당자 배정된 프로젝트 없음</div>
          :Object.values(memberMap).sort((a,b)=>b.projects.length-a.projects.length).map(m=>{
            const mem=members.find(x=>x.name===m.name);
            const dept=mem?depts.find(d=>d.id===mem.dept):null;
            const active=m.projects.filter(p=>p.stage!=='closeout');
            return(
              <div key={m.name} style={{padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
                  <div style={{width:28,height:28,borderRadius:'50%',background:dept?dept.color+'30':'var(--bg4)',border:'1px solid '+(dept?dept.color+'50':'var(--border)'),display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:dept?dept.color:'var(--text2)',flexShrink:0}}>{m.name[0]}</div>
                  <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{m.name}</div>{dept&&<div style={{fontSize:10,color:dept.color}}>{dept.label}</div>}</div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:14,fontWeight:700,color:'var(--accent)',fontFamily:"'DM Mono',monospace"}}>{active.length}</div>
                    <div style={{fontSize:10,color:'var(--text3)'}}>진행 중</div>
                  </div>
                </div>
                <div style={{display:'flex',gap:4,flexWrap:'wrap',paddingLeft:38}}>
                  {m.projects.slice(0,4).map(p=>{const si=stageInfo(p.stage);const pc=phaseColor(si.phase);return(
                    <span key={p.id} onClick={()=>onOpen(p)} style={{fontSize:10,padding:'2px 7px',borderRadius:3,cursor:'pointer',background:pc+'15',color:pc,border:'1px solid '+pc+'25'}}>{p.name}</span>
                  );})}
                  {m.projects.length>4&&<span style={{fontSize:10,color:'var(--text3)'}}>+{m.projects.length-4}</span>}
                </div>
              </div>
            );
          })}
        </div>
        <div className="card">
          <div style={{fontSize:16,fontWeight:600,marginBottom:16}}>부서별 참여 현황</div>
          {depts.map(dept=>{
            const dm=members.filter(m=>m.dept===dept.id);
            const ds=POMS_STAGES.filter(s=>s.owner===dept.label);
            const dp=projects.filter(p=>ds.some(s=>s.id===p.stage));
            return(
              <div key={dept.id} style={{padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:5}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:dept.color}}/>
                  <span style={{fontSize:13,fontWeight:600,flex:1}}>{dept.label}</span>
                  <span style={{fontSize:11,color:'var(--text2)'}}>{dm.length}명</span>
                  <span style={{fontSize:12,fontWeight:600,color:dept.color,fontFamily:"'DM Mono',monospace",marginLeft:8}}>{dp.length}건</span>
                </div>
                <div style={{paddingLeft:16,fontSize:11,color:'var(--text3)',marginBottom:4}}>담당: {ds.map(s=>s.label).join(', ')||'—'}</div>
                <div style={{display:'flex',gap:4,flexWrap:'wrap',paddingLeft:16}}>
                  {dm.map(m=><span key={m.id} style={{fontSize:10,padding:'2px 7px',borderRadius:10,background:dept.color+'15',color:dept.color,border:'1px solid '+dept.color+'25'}}>{m.name}{m.role?' · '+m.role:''}</span>)}
                  {dm.length===0&&<span style={{fontSize:11,color:'var(--text3)'}}>팀원 미등록 (Settings에서 추가)</span>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div className="card">
        <div style={{fontSize:16,fontWeight:600,marginBottom:16}}>프로젝트 × 담당자 매트릭스</div>
        <div style={{overflowX:'auto'}}>
          <table style={{borderCollapse:'collapse',fontSize:12,width:'100%'}}>
            <thead><tr style={{borderBottom:'1px solid var(--border)'}}>
              {['프로젝트','현재 단계','담당자','체류','CR'].map(h=><th key={h} style={{padding:'6px 10px',textAlign:'left',fontSize:11,color:'var(--text2)',fontWeight:600}}>{h}</th>)}
            </tr></thead>
            <tbody>
              {projects.filter(p=>p.stage!=='closeout').map(p=>{
                const si=stageInfo(p.stage);const pc=phaseColor(si.phase);
                const assignee=(p.assignments||{})[p.stage]||'—';
                const mem=members.find(m=>m.name===assignee);
                const dept=mem?depts.find(d=>d.id===mem.dept):null;
                const days=daysDiff(p.stageEnteredAt);
                const cr=(p.crs||[]).filter(c=>['open','review','pending'].includes(c.status)).length;
                return(
                  <tr key={p.id} onClick={()=>onOpen(p)} style={{borderBottom:'1px solid var(--border)',cursor:'pointer'}}
                    onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <td style={{padding:'8px 10px',fontWeight:600}}>{p.name}</td>
                    <td style={{padding:'8px 10px'}}><span className="badge" style={{background:pc+'20',color:pc,border:'1px solid '+pc+'30',fontSize:10}}>{si.label}</span></td>
                    <td style={{padding:'8px 10px'}}>
                      {assignee!=='—'?(
                        <div style={{display:'flex',alignItems:'center',gap:6}}>
                          <div style={{width:20,height:20,borderRadius:'50%',background:dept?dept.color+'30':'var(--bg4)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:dept?dept.color:'var(--text2)'}}>{assignee[0]}</div>
                          <span>{assignee}</span>{dept&&<span style={{fontSize:10,color:dept.color}}>({dept.label})</span>}
                        </div>
                      ):<span style={{color:'var(--red)',fontSize:11}}>미배정</span>}
                    </td>
                    <td style={{padding:'8px 10px',fontFamily:"'DM Mono',monospace",fontSize:12,color:'var(--text2)'}}>{days}일</td>
                    <td style={{padding:'8px 10px'}}>{cr>0&&<span style={{background:'var(--amber-dim)',color:'var(--amber)',fontSize:10,fontWeight:700,padding:'2px 6px',borderRadius:3}}>CR×{cr}</span>}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ── Settings ────────────────────────────────────────── */
function Settings({alertCfg,setAlertCfg,depts,setDepts,members,setMembers}){
  const [tab,setTab]=useState('members');
  const [newMember,setNewMember]=useState({name:'',dept:'sales',role:''});
  const [newDept,setNewDept]=useState({label:'',color:'#4d9fff',en:''});

  function addMember(){
    if(!newMember.name.trim())return;
    setMembers(p=>[...p,{id:genId(),...newMember}]);
    setNewMember({name:'',dept:'sales',role:''});
  }
  function removeMember(id){ setMembers(p=>p.filter(m=>m.id!==id)) }
  function addDept(){
    if(!newDept.label.trim())return;
    setDepts(p=>[...p,{id:genId(),...newDept}]);
    setNewDept({label:'',color:'#4d9fff',en:''});
  }
  function removeDept(id){ setDepts(p=>p.filter(d=>d.id!==id)) }

  return(
    <div style={{maxWidth:900,width:'100%'}}>
      <div style={{fontSize:16,fontWeight:700,marginBottom:16,letterSpacing:'-.02em'}}>Settings</div>
      <div className="tabs">
        {[['members','팀원 관리'],['depts','부서 관리'],['alerts','알람 설정']].map(([t,l])=>(
          <button key={t} className={`tab${tab===t?' active':''}`} onClick={()=>setTab(t)}>{l}</button>
        ))}
      </div>

      {/* 팀원 관리 */}
      {tab==='members'&&(
        <div>
          <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--r2)',overflow:'hidden',marginBottom:16}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 120px 100px 40px',gap:0,
              padding:'7px 14px',background:'var(--bg3)',borderBottom:'1px solid var(--border)',
              fontSize:11,fontWeight:600,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.04em'}}>
              <span>이름</span><span>부서</span><span>직책/역할</span><span/>
            </div>
            {members.map(m=>{
              const dept=depts.find(d=>d.id===m.dept);
              return(
                <div key={m.id} style={{display:'grid',gridTemplateColumns:'1fr 120px 100px 40px',
                  gap:0,padding:'10px 14px',borderBottom:'1px solid var(--border)',fontSize:13,alignItems:'center'}}>
                  <span style={{fontWeight:500}}>{m.name}</span>
                  <span>
                    {dept&&<span className="badge" style={{background:dept.color+'18',color:dept.color,
                      border:`1px solid ${dept.color}30`,fontSize:10}}>{dept.label}</span>}
                  </span>
                  <span style={{fontSize:12,color:'var(--text2)'}}>{m.role||'—'}</span>
                  <button onClick={()=>removeMember(m.id)}
                    style={{background:'transparent',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:14}}>×</button>
                </div>
              );
            })}
            {members.length===0&&
              <div style={{padding:'16px',color:'var(--text3)',fontSize:13,textAlign:'center'}}>팀원 없음</div>}
          </div>
          {/* 추가 폼 */}
          <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--r2)',padding:'14px'}}>
            <div style={{fontSize:12,fontWeight:600,color:'var(--text2)',marginBottom:10,
              textTransform:'uppercase',letterSpacing:'.04em'}}>팀원 추가</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:10}}>
              <div className="field" style={{marginBottom:0}}>
                <label>이름</label>
                <input value={newMember.name} onChange={e=>setNewMember(p=>({...p,name:e.target.value}))}
                  placeholder="홍길동" onKeyDown={e=>e.key==='Enter'&&addMember()}/>
              </div>
              <div className="field" style={{marginBottom:0}}>
                <label>부서</label>
                <select value={newMember.dept} onChange={e=>setNewMember(p=>({...p,dept:e.target.value}))}>
                  {depts.map(d=><option key={d.id} value={d.id}>{d.label}</option>)}
                </select>
              </div>
              <div className="field" style={{marginBottom:0}}>
                <label>직책/역할</label>
                <input value={newMember.role} onChange={e=>setNewMember(p=>({...p,role:e.target.value}))}
                  placeholder="팀장, 엔지니어 등"/>
              </div>
            </div>
            <button className="btn primary sm" disabled={!newMember.name.trim()} onClick={addMember}>
              추가
            </button>
          </div>
        </div>
      )}

      {/* 부서 관리 */}
      {tab==='depts'&&(
        <div>
          <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--r2)',overflow:'hidden',marginBottom:16}}>
            {depts.map((d,i)=>(
              <div key={d.id} style={{display:'flex',alignItems:'center',gap:12,
                padding:'10px 14px',borderBottom:i<depts.length-1?'1px solid var(--border)':'none'}}>
                <div style={{width:12,height:12,borderRadius:'50%',background:d.color,flexShrink:0}}/>
                <span style={{fontWeight:600,fontSize:13,width:80}}>{d.label}</span>
                <span style={{fontSize:12,color:'var(--text2)',flex:1}}>{d.en}</span>
                <input type="color" value={d.color}
                  onChange={e=>setDepts(p=>p.map(dep=>dep.id===d.id?{...dep,color:e.target.value}:dep))}
                  style={{width:28,height:28,border:'none',background:'transparent',cursor:'pointer',padding:0}}/>
                <button onClick={()=>removeDept(d.id)}
                  style={{background:'transparent',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:14}}>×</button>
              </div>
            ))}
          </div>
          <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--r2)',padding:'14px'}}>
            <div style={{fontSize:12,fontWeight:600,color:'var(--text2)',marginBottom:10,
              textTransform:'uppercase',letterSpacing:'.04em'}}>부서 추가</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 50px',gap:10,marginBottom:10}}>
              <div className="field" style={{marginBottom:0}}>
                <label>부서명</label>
                <input value={newDept.label} onChange={e=>setNewDept(p=>({...p,label:e.target.value}))} placeholder="구매"/>
              </div>
              <div className="field" style={{marginBottom:0}}>
                <label>영문명</label>
                <input value={newDept.en} onChange={e=>setNewDept(p=>({...p,en:e.target.value}))} placeholder="Procurement"/>
              </div>
              <div className="field" style={{marginBottom:0}}>
                <label>색상</label>
                <input type="color" value={newDept.color} onChange={e=>setNewDept(p=>({...p,color:e.target.value}))}
                  style={{height:36,padding:2,cursor:'pointer'}}/>
              </div>
            </div>
            <button className="btn primary sm" disabled={!newDept.label.trim()} onClick={addDept}>추가</button>
          </div>
        </div>
      )}

      {/* 알람 설정 */}
      {tab==='alerts'&&(
        <div>
          <div style={{fontSize:12,color:'var(--text2)',marginBottom:16,lineHeight:1.6}}>
            단계별 기한 일수. 해당 일수 초과 시 대시보드에 알람이 표시됩니다.
          </div>
          <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--r2)',overflow:'hidden'}}>
            {POMS_STAGES.map((s,i)=>{
              const pc2=phaseColor(s.phase);
              return(
                <div key={s.id} style={{display:'flex',alignItems:'center',gap:14,
                  padding:'11px 16px',borderBottom:i<POMS_STAGES.length-1?'1px solid var(--border)':'none'}}>
                  <span className="badge" style={{background:pc2+'18',color:pc2,border:`1px solid ${pc2}30`,
                    fontSize:10,width:140,justifyContent:'center',flexShrink:0}}>{s.label}</span>
                  <span style={{flex:1,fontSize:11,color:'var(--text3)'}}>{s.en}</span>
                  <input type="range" min={3} max={60} step={1}
                    value={alertCfg[s.id]||s.days}
                    onChange={e=>setAlertCfg(p=>({...p,[s.id]:Number(e.target.value)}))}
                    style={{width:100}}/>
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:700,
                    color:'var(--accent)',width:42,textAlign:'right'}}>{alertCfg[s.id]||s.days}일</span>
                  <button className="btn ghost xs" onClick={()=>setAlertCfg(p=>({...p,[s.id]:s.days}))}>초기화</button>
                </div>
              );
            })}
          </div>
          <div style={{marginTop:12,padding:'10px 14px',background:'var(--bg3)',borderRadius:'var(--r)',
            fontSize:12,color:'var(--text2)',lineHeight:1.7}}>
            <b style={{color:'var(--text)'}}>알람 기준</b><br/>
            · 기한의 40% → 주의 (체류 바 색상 변경)<br/>
            · 기한의 70% → 경고 (대시보드 알람 목록)<br/>
            · 기한 100% 초과 → 🔴 빨간 배너 표시
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
