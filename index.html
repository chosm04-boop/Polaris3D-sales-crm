<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f11;--bg2:#17171a;--bg3:#1e1e23;--bg4:#26262d;
  --border:#2e2e36;--border2:#3a3a44;
  --text:#e8e8f0;--text2:#9090a8;--text3:#5a5a6e;
  --accent:#6c63ff;--accent2:#4f48cc;
  --teal:#00c896;--amber:#f5a623;--red:#ff4e4e;
  --blue:#4a9eff;--green:#3dd68c;--purple:#a78bfa;
  --r:8px;--r2:12px;
}
html{background:var(--bg);color:var(--text);font-family:'Pretendard',sans-serif;font-size:14px}
body{min-height:100vh}
#root{min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--bg4)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--text2)}
.btn.ghost:hover{background:var(--bg3);color:var(--text)}
.btn.danger{background:transparent;border-color:var(--red);color:var(--red)}
.btn.danger:hover{background:var(--red);color:#fff}
.btn.sm{padding:4px 10px;font-size:12px}
.btn.icon{padding:7px}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:13px;border-radius:var(--r);padding:8px 12px;outline:none;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:72px}
label{font-size:12px;color:var(--text2);font-weight:500;display:block;margin-bottom:4px}
.field{margin-bottom:14px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:24px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:600}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}

function useStorage(key,init){
  const [val,setVal]=useState(()=>{
    try{
      const s=localStorage.getItem(key);
      if(s){
        const parsed=JSON.parse(s);
        // 저장된 딜이 없으면(빈배열이면) 시드 주입
        if(key==='crm_deals2'&&Array.isArray(parsed)&&parsed.length===0) return SEED_DEALS;
        return parsed;
      }
      if(key==='crm_deals2') return SEED_DEALS;
      return init;
    }catch{return init}
  });
  const set=useCallback(v=>{setVal(prev=>{const next=typeof v==='function'?v(prev):v;localStorage.setItem(key,JSON.stringify(next));return next});},[key]);
  return[val,set];
}

}

/* ── 알람/점수 ────────────────────────────────────────────── */
function alertLevel(deal,settings){
  if(['holding','lost','delivery'].includes(deal.stage))return null;
  const days=daysDiff(deal.stageEnteredAt);
  const limit=settings[deal.stage]||30;
  if(days>=limit)return'over';
  if(days>=limit*.6)return'warn';
  if(days>=limit*.3)return'caution';
  return null;
}
function score(deal,settings){
  const days=daysDiff(deal.stageEnteredAt);
  const limit=settings[deal.stage]||30;
  const stayR=Math.min(days/limit,1);
  const totalAmt=(deal.items||[]).reduce((a,i)=>a+(i.qty||1)*(i.unitPrice||0),0);
  const amtS=Math.min(totalAmt/100000000,1);
  const sw={negotiate:1,quote:.9,proposal:.8,meeting:.6,closing:.5,lead:.4};
  return Math.round((stayR*.4+amtS*.35+(sw[deal.stage]||.3)*.25)*100);
}
function dealTotal(deal){return(deal.items||[]).reduce((a,i)=>a+(i.qty||1)*(i.unitPrice||0),0)}

    const s=localStorage.getItem('crm_deals2');
    if(!s||(JSON.parse(s)||[]).length===0){
      localStorage.setItem('crm_deals2',JSON.stringify(SEED_DEALS));
    }
  }catch(e){}
})();

function App(){
  const [deals,setDeals]=useStorage('crm_deals2',[]);
  const [settings,setSettings]=useStorage('crm_alerts',ALERT_DEFAULTS);
  const [view,setView]=useState('dashboard');
  const [filterSales,setFilterSales]=useState('전체');
  const [search,setSearch]=useState('');
  const [modal,setModal]=useState(null);
  const [selected,setSelected]=useState(null);

  useEffect(()=>{
    const now=today();
    setDeals(prev=>prev.map(d=>{
      if(['holding','lost','delivery'].includes(d.stage))return d;
      const days=daysDiff(d.stageEnteredAt);
      const limit=settings[d.stage]||30;
      if(days>=limit)return{...d,stage:'holding',history:[...(d.history||[]),{date:now,from:d.stage,to:'holding',note:'자동 홀딩'}]};
      return d;
    }));
  },[]);

  const filtered=useMemo(()=>deals.filter(d=>{
    if(filterSales!=='전체'&&d.salesPerson!==filterSales)return false;
    if(search&&!d.title?.toLowerCase().includes(search.toLowerCase())&&!d.company?.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  }),[deals,filterSales,search]);

  function addDeal(data){setDeals(p=>[{id:genId(),createdAt:today(),stageEnteredAt:today(),stage:'lead',history:[],notes:[],items:[],paySchedule:[],...data},...p])}
  function updateDeal(id,data){
    setDeals(p=>p.map(d=>{
      if(d.id!==id)return d;
      const sc=data.stage&&data.stage!==d.stage;
      return{...d,...data,stageEnteredAt:sc?today():d.stageEnteredAt,history:sc?[...(d.history||[]),{date:today(),from:d.stage,to:data.stage,note:data._note||''}]:d.history||[]};
    }));
  }
  function deleteDeal(id){setDeals(p=>p.filter(d=>d.id!==id))}

  function open(deal){setSelected(deal);setModal('detail')}

  const alertDeals=useMemo(()=>filtered.filter(d=>['over','warn'].includes(alertLevel(d,settings))),[filtered,settings]);

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar view={view} setView={setView} alertCount={alertDeals.length}/>
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        <TopBar filterSales={filterSales} setFilterSales={setFilterSales} search={search} setSearch={setSearch} onNew={()=>setModal('new')}/>
        <div style={{flex:1,overflow:'auto',padding:'20px'}}>
          {view==='dashboard'&&<Dashboard deals={filtered} settings={settings} onOpen={open}/>}
          {view==='funnel'&&<FunnelBoard deals={filtered} settings={settings} layer="sales" onOpen={open} onStage={(id,s)=>updateDeal(id,{stage:s})}/>}
          {view==='post'&&<FunnelBoard deals={filtered} settings={settings} layer="post" onOpen={open} onStage={(id,s)=>updateDeal(id,{stage:s})}/>}
          {view==='forecast'&&<Forecast deals={filtered}/>}
          {view==='settings'&&<Settings settings={settings} setSettings={setSettings}/>}
        </div>
      </div>
      {modal==='new'&&<DealModal onClose={()=>setModal(null)} onSave={d=>{addDeal(d);setModal(null)}}/>}
      {modal==='detail'&&selected&&
        <DealDetail
          deal={deals.find(d=>d.id===selected.id)||selected}
          settings={settings}
          onClose={()=>{setModal(null);setSelected(null)}}
          onUpdate={data=>updateDeal(selected.id,data)}
          onDelete={()=>{deleteDeal(selected.id);setModal(null);setSelected(null)}}
        />}
    </div>
  );
}

function Sidebar({view,setView,alertCount}){

      </div>
      {items.map(item=>(

function MiniCard({deal,settings,onOpen}){
  const al=alertLevel(deal,settings);
  const days=daysDiff(deal.stageEnteredAt);
  const limit=settings[deal.stage]||30;
  const pct=Math.min((days/limit)*100,100);
  const bc=al==='over'?'var(--red)':al==='warn'?'var(--amber)':stageColor(deal.stage);
  const amt=dealTotal(deal);
  return(
    <div onClick={()=>onOpen(deal)} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderLeft:`3px solid ${bc}`,borderRadius:'var(--r)',padding:'9px 10px',cursor:'pointer'}}>

      <div style={{background:'var(--bg4)',borderRadius:2,height:3,marginTop:7}}>

      </div>
    </div>
  );
}

/* ── Forecast ────────────────────────────────────────────── */
function Forecast({deals}){
  const currentYear=new Date().getFullYear();
  const years=[currentYear-1,currentYear,currentYear+1,currentYear+2];
  const [selYear,setSelYear]=useState(currentYear);

  // 매출 예정일 기반으로 연도별 집계
  function getYearData(year){
    const rows=[];
    deals.forEach(d=>{
      (d.paySchedule||[]).forEach(ps=>{
        if(ps.date&&new Date(ps.date).getFullYear()===year){
          rows.push({deal:d,pay:ps});
        }
      });
    });
    return rows;
  }

  // 연도별 요약 (퍼널 단계별)
  function getYearSummary(year){
    const rows=getYearData(year);
    const total=rows.reduce((a,r)=>a+(r.pay.amount||0),0);
    const won=rows.filter(r=>POST_STAGES.some(s=>s.id===r.deal.stage)).reduce((a,r)=>a+(r.pay.amount||0),0);
    const pipeline=rows.filter(r=>SALES_STAGES.some(s=>s.id===r.deal.stage)).reduce((a,r)=>a+(r.pay.amount||0),0);
    return{total,won,pipeline,rows};
  }

  // 전체 연도 요약
  const yearSummaries=years.map(y=>({year:y,...getYearSummary(y)}));
  const maxAmt=Math.max(...yearSummaries.map(y=>y.total),1);

  const selData=getYearData(selYear);

  // 월별 집계
  const months=Array.from({length:12},(_,i)=>i+1);
  const monthAmts=months.map(m=>{
    const rows=selData.filter(r=>new Date(r.pay.date).getMonth()+1===m);
    return{month:m,total:rows.reduce((a,r)=>a+(r.pay.amount||0),0),won:rows.filter(r=>POST_STAGES.some(s=>s.id===r.deal.stage)).reduce((a,r)=>a+(r.pay.amount||0),0)};
  });
  const maxMonth=Math.max(...monthAmts.map(m=>m.total),1);

  // 딜별 목록
  const dealRows=[];
  selData.forEach(({deal,pay})=>{
    const existing=dealRows.find(r=>r.deal.id===deal.id);
    if(existing)existing.total+=(pay.amount||0);
    else dealRows.push({deal,total:pay.amount||0});
  });
  dealRows.sort((a,b)=>b.total-a.total);

  return(
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      {/* 연도별 바 */}
      <div className="card">
        <div style={{fontSize:13,fontWeight:600,marginBottom:16}}>연도별 Forecast</div>
        <div style={{display:'flex',gap:16,alignItems:'flex-end',height:120,marginBottom:12}}>
          {yearSummaries.map(y=>(
            <div key={y.year} onClick={()=>setSelYear(y.year)}
              style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',cursor:'pointer'}}>
              <div style={{fontSize:11,color:'var(--text2)',marginBottom:4}}>{fmt(y.total)}</div>
              <div style={{width:'100%',display:'flex',flexDirection:'column',justifyContent:'flex-end',height:80,gap:2}}>
                <div style={{background:'var(--teal)',borderRadius:3,height:`${(y.won/maxAmt)*80}px`,minHeight:y.won>0?4:0,transition:'height .3s'}}/>
                <div style={{background:y.year===selYear?'var(--accent)':'var(--accent)'+'60',borderRadius:3,height:`${(y.pipeline/maxAmt)*80}px`,minHeight:y.pipeline>0?4:0,transition:'height .3s'}}/>
              </div>
              <div style={{fontSize:12,fontWeight:600,marginTop:6,color:y.year===selYear?'var(--text)':'var(--text2)'}}>{y.year}</div>
              {y.year===selYear&&<div style={{width:6,height:6,background:'var(--accent)',borderRadius:'50%',marginTop:4}}/>}
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:16,fontSize:11,color:'var(--text2)'}}>
          <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,background:'var(--teal)',borderRadius:2,display:'inline-block'}}/>수주 완료</span>
          <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,background:'var(--accent)',borderRadius:2,display:'inline-block'}}/>영업 파이프라인</span>
        </div>
      </div>

      {/* 선택 연도 월별 */}
      <div className="card">
        <div style={{fontSize:13,fontWeight:600,marginBottom:16}}>{selYear}년 월별 Forecast</div>
        <div style={{display:'flex',gap:6,alignItems:'flex-end',height:100}}>
          {monthAmts.map(m=>(
            <div key={m.month} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center'}}>
              <div style={{width:'100%',display:'flex',flexDirection:'column',justifyContent:'flex-end',height:80,gap:1}}>
                <div style={{background:'var(--teal)',borderRadius:'2px 2px 0 0',height:`${(m.won/maxMonth)*80}px`,minHeight:m.won>0?3:0}}/>
                <div style={{background:'var(--accent)60',borderRadius:'2px 2px 0 0',height:`${((m.total-m.won)/maxMonth)*80}px`,minHeight:(m.total-m.won)>0?3:0}}/>
              </div>
              <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>{m.month}월</div>
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:20,marginTop:16,flexWrap:'wrap'}}>
          {[
            {label:'연간 합계',val:fmt(yearSummaries.find(y=>y.year===selYear)?.total||0),color:'var(--text)'},
            {label:'수주 완료',val:fmt(yearSummaries.find(y=>y.year===selYear)?.won||0),color:'var(--teal)'},
            {label:'파이프라인',val:fmt(yearSummaries.find(y=>y.year===selYear)?.pipeline||0),color:'var(--accent)'},
            {label:'딜 수',val:`${dealRows.length}건`,color:'var(--text2)'},
          ].map(k=>(
            <div key={k.label}>
              <div style={{fontSize:11,color:'var(--text3)',marginBottom:2}}>{k.label}</div>
              <div style={{fontSize:18,fontWeight:700,color:k.color,fontFamily:"'JetBrains Mono',monospace"}}>{k.val}</div>
            </div>
          ))}
        </div>
      </div>

      {/* 딜별 목록 */}
      <div className="card">
        <div style={{fontSize:13,fontWeight:600,marginBottom:14}}>{selYear}년 딜 목록</div>
        {dealRows.length===0
          ?<div style={{color:'var(--text3)',fontSize:13}}>매출 예정일이 {selYear}년으로 등록된 딜 없음</div>
          :<table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead>
              <tr style={{borderBottom:'1px solid var(--border)'}}>
                {['딜 제목','담당자','단계','예상 금액','매출 예정일'].map(h=>(
                  <th key={h} style={{padding:'6px 8px',textAlign:'left',fontSize:11,color:'var(--text2)',fontWeight:500}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {dealRows.map(({deal,total})=>{
                const ps=(deal.paySchedule||[]).filter(p=>p.date&&new Date(p.date).getFullYear()===selYear);
                return ps.map((p,pi)=>(
                  <tr key={deal.id+pi} style={{borderBottom:'1px solid var(--border)',opacity:deal.stage==='lost'?.5:1}}>
                    <td style={{padding:'8px'}}><span style={{fontWeight:600}}>{deal.title||deal.company}</span></td>
                    <td style={{padding:'8px',color:'var(--text2)'}}>{deal.salesPerson}</td>
                    <td style={{padding:'8px'}}>
                      <span style={{background:stageColor(deal.stage)+'22',color:stageColor(deal.stage),fontSize:11,padding:'2px 8px',borderRadius:4,fontWeight:500}}>{getLabel(deal.stage)}</span>
                    </td>
                    <td style={{padding:'8px',fontFamily:"'JetBrains Mono',monospace",color:'var(--teal)',fontWeight:600}}>{fmtFull(p.amount)}</td>
                    <td style={{padding:'8px'}}>
                      <span style={{background:p.type==='선금'?'var(--amber)22':'var(--blue)22',color:p.type==='선금'?'var(--amber)':'var(--blue)',fontSize:11,padding:'2px 6px',borderRadius:4,marginRight:6}}>{p.type||'미정'}</span>
                      {p.date}
                    </td>
                  </tr>
                ));
              })}
            </tbody>
          </table>}
      </div>
    </div>
  );
}

          <label>단계</label>
          <select value={form.stage} onChange={e=>set('stage',e.target.value)}>
            {allStages.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
          </select>
        </div>

        {/* 품목 */}
        <div style={{marginBottom:14}}>
          <label style={{marginBottom:8,display:'block'}}>품목 / 금액</label>
          <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'var(--r)',overflow:'hidden'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 70px 110px 110px 28px',gap:0,padding:'6px 10px',borderBottom:'1px solid var(--border)',fontSize:11,color:'var(--text3)'}}>
              <span>품목</span><span style={{textAlign:'center'}}>수량</span><span style={{textAlign:'center'}}>단가</span><span style={{textAlign:'right'}}>합계</span><span/>
            </div>
            {form.items.map(item=>(
              <div key={item.id} style={{display:'grid',gridTemplateColumns:'1fr 70px 110px 110px 28px',gap:4,padding:'6px 10px',borderBottom:'1px solid var(--border)',alignItems:'center'}}>
                <input value={item.name} onChange={e=>setItem(item.id,'name',e.target.value)} placeholder="품목명" style={{fontSize:13}}/>
                <input type="number" value={item.qty} onChange={e=>setItem(item.id,'qty',Number(e.target.value))} min={1} style={{textAlign:'center',fontSize:13}}/>
                <input type="number" value={item.unitPrice} onChange={e=>setItem(item.id,'unitPrice',Number(e.target.value))} placeholder="0" style={{textAlign:'right',fontSize:13}}/>
                <div style={{textAlign:'right',fontSize:12,color:'var(--teal)',fontFamily:"'JetBrains Mono',monospace",padding:'0 4px'}}>
                  {((item.qty||1)*(item.unitPrice||0)).toLocaleString()}
                </div>
                <button onClick={()=>removeItem(item.id)} style={{background:'transparent',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:14,padding:'0 2px'}}>×</button>
              </div>
            ))}
            <div style={{padding:'8px 10px',borderBottom:'1px solid var(--border)'}}>
              <button className="btn ghost sm" style={{width:'100%',justifyContent:'center'}} onClick={addItem}>+ 품목 추가</button>
            </div>
            <div style={{padding:'8px 14px',display:'flex',justifyContent:'flex-end',gap:12,fontSize:13}}>
              <span style={{color:'var(--text2)'}}>KRW 합계</span>
              <span style={{fontWeight:700,color:'var(--teal)',fontFamily:"'JetBrains Mono',monospace"}}>₩{total.toLocaleString()}</span>
            </div>
          </div>
        </div>

        {/* 매출 예정일 */}
        <div style={{marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <label style={{margin:0}}>매출 예정일</label>
            <button className="btn ghost sm" onClick={addPay}>+ 추가</button>
          </div>
          {form.paySchedule.length===0
            ?<div style={{fontSize:12,color:'var(--text3)',padding:'8px',background:'var(--bg3)',borderRadius:'var(--r)',textAlign:'center'}}>등록된 매출 예정일 없음</div>
            :form.paySchedule.map(ps=>(
              <div key={ps.id} style={{display:'grid',gridTemplateColumns:'80px 1fr 130px 28px',gap:6,marginBottom:6,alignItems:'center'}}>
                <select value={ps.type} onChange={e=>setPay(ps.id,'type',e.target.value)} style={{fontSize:12}}>
                  {['선금','중도금','잔금','일시불','기타'].map(t=><option key={t}>{t}</option>)}
                </select>
                <input type="date" value={ps.date} onChange={e=>setPay(ps.id,'date',e.target.value)} style={{fontSize:13}}/>
                <input type="number" value={ps.amount} onChange={e=>setPay(ps.id,'amount',Number(e.target.value))} placeholder="금액" style={{fontSize:13,textAlign:'right'}}/>
                <button onClick={()=>removePay(ps.id)} style={{background:'transparent',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:14}}>×</button>
              </div>
            ))}
        </div>

        <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:8}}>
          <button className="btn ghost" onClick={onClose}>취소</button>
          <button className="btn primary" disabled={!form.title.trim()} onClick={()=>form.title.trim()&&onSave(form)}>저장</button>
        </div>
      </div>
    </div>
  );
}

/* ── DealDetail ──────────────────────────────────────────── */
function DealDetail({deal,settings,onClose,onUpdate,onDelete}){
  const [tab,setTab]=useState('info'); // info | notes | history
  const [editing,setEditing]=useState(false);
  const [form,setForm]=useState({...deal,items:deal.items?.length?deal.items:[{id:genId(),name:'',qty:1,unitPrice:0}],paySchedule:deal.paySchedule||[]});
  const [newNote,setNewNote]=useState('');
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));

  const allSales=SALES_STAGES.filter(s=>s.layer==='sales');
  const allStages=[...allSales,...POST_STAGES,SALES_STAGES.find(s=>s.id==='holding'),SALES_STAGES.find(s=>s.id==='lost')];

  const days=daysDiff(deal.stageEnteredAt);
  const limit=settings[deal.stage]||30;
  const al=alertLevel(deal,settings);
  const total=dealTotal(deal);
  const formTotal=(form.items||[]).reduce((a,i)=>a+(i.qty||1)*(i.unitPrice||0),0);

  function setItem(id,k,v){setForm(p=>({...p,items:p.items.map(i=>i.id===id?{...i,[k]:v}:i)}))}
  function addItem(){setForm(p=>({...p,items:[...p.items,{id:genId(),name:'',qty:1,unitPrice:0}]}))}
  function removeItem(id){setForm(p=>({...p,items:p.items.filter(i=>i.id!==id)}))}
  function addPay(){setForm(p=>({...p,paySchedule:[...p.paySchedule,{id:genId(),type:'선금',date:'',amount:0}]}))}
  function setPay(id,k,v){setForm(p=>({...p,paySchedule:p.paySchedule.map(ps=>ps.id===id?{...ps,[k]:v}:ps)}))}
  function removePay(id){setForm(p=>({...p,paySchedule:p.paySchedule.filter(ps=>ps.id!==id)}))}

  function addNote(){
    if(!newNote.trim())return;
    onUpdate({notes:[...(deal.notes||[]),{id:genId(),date:new Date().toLocaleString('ko-KR'),text:newNote.trim()}]});
    setNewNote('');
  }

  function deleteNote(nid){onUpdate({notes:(deal.notes||[]).filter(n=>n.id!==nid)})}

  function saveEdit(){onUpdate({...form,_note:''});setEditing(false)}

  const nextSales=(()=>{const idx=allSales.findIndex(s=>s.id===deal.stage);return idx>=0&&idx<allSales.length-1?allSales[idx+1]:null})();
  const nextPost=(()=>{const idx=POST_STAGES.findIndex(s=>s.id===deal.stage);return idx>=0&&idx<POST_STAGES.length-1?POST_STAGES[idx+1]:null})();

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:660}}>
        {/* 헤더 */}
        <div className="modal-header">
          <div>
            <div className="modal-title">{deal.title||deal.company}</div>
            <div style={{fontSize:12,color:'var(--text2)',marginTop:3,display:'flex',gap:12}}>
              <span>{deal.salesPerson}</span>
              {deal.company&&<span>{deal.company}</span>}
              {deal.contact&&<span>{deal.contact}</span>}
              {deal.phone&&<span>{deal.phone}</span>}
            </div>
          </div>
          <div style={{display:'flex',gap:6}}>
            {!editing&&<button className="btn sm" onClick={()=>setEditing(true)}>수정</button>}
            <button className="btn ghost icon" onClick={onClose}>✕</button>
          </div>
        </div>

        {/* 단계 + 체류 바 */}
        <div style={{background:'var(--bg3)',borderRadius:'var(--r)',padding:'12px 14px',marginBottom:16,border:`1px solid ${al?(al==='over'?'var(--red)':'var(--amber)'):'var(--border)'}`}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
            <span style={{background:stageColor(deal.stage)+'22',color:stageColor(deal.stage),fontWeight:600,fontSize:12,padding:'3px 10px',borderRadius:4}}>{getLabel(deal.stage)}</span>
            {al&&<span style={{fontSize:12,color:al==='over'?'var(--red)':'var(--amber)',fontWeight:500}}>{al==='over'?'홀딩 임박':'주의 필요'}</span>}
            <span style={{marginLeft:'auto',fontSize:12,color:'var(--text2)',fontFamily:"'JetBrains Mono',monospace"}}>{days}일 / {limit}일</span>
          </div>
          <div style={{background:'var(--bg4)',borderRadius:3,height:5}}>
            <div style={{height:'100%',borderRadius:3,transition:'width .3s',background:al==='over'?'var(--red)':al?'var(--amber)':'var(--teal)',width:`${Math.min((days/limit)*100,100)}%`}}/>
          </div>
        </div>

        {editing?(
          <>
            {/* 편집 모드 */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div className="field"><label>딜 제목</label><input value={form.title||''} onChange={e=>set('title',e.target.value)}/></div>
              <div className="field"><label>고객사</label><input value={form.company||''} onChange={e=>set('company',e.target.value)}/></div>
              <div className="field"><label>담당자</label><input value={form.contact||''} onChange={e=>set('contact',e.target.value)}/></div>
              <div className="field"><label>연락처</label><input value={form.phone||''} onChange={e=>set('phone',e.target.value)}/></div>
              <div className="field"><label>영업 담당자</label>
                <select value={form.salesPerson} onChange={e=>set('salesPerson',e.target.value)}>
                  {SALESPEOPLE.slice(1).map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
              <div className="field"><label>단계</label>
                <select value={form.stage} onChange={e=>set('stage',e.target.value)}>
                  {allStages.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
                </select>
              </div>
            </div>

            {/* 품목 편집 */}
            <div style={{marginBottom:14}}>
              <label style={{marginBottom:8,display:'block'}}>품목 / 금액</label>
              <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'var(--r)',overflow:'hidden'}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 70px 110px 110px 28px',padding:'6px 10px',borderBottom:'1px solid var(--border)',fontSize:11,color:'var(--text3)'}}>
                  <span>품목</span><span style={{textAlign:'center'}}>수량</span><span style={{textAlign:'center'}}>단가</span><span style={{textAlign:'right'}}>합계</span><span/>
                </div>
                {(form.items||[]).map(item=>(
                  <div key={item.id} style={{display:'grid',gridTemplateColumns:'1fr 70px 110px 110px 28px',gap:4,padding:'6px 10px',borderBottom:'1px solid var(--border)',alignItems:'center'}}>
                    <input value={item.name||''} onChange={e=>setItem(item.id,'name',e.target.value)} style={{fontSize:13}}/>
                    <input type="number" value={item.qty||1} onChange={e=>setItem(item.id,'qty',Number(e.target.value))} style={{textAlign:'center',fontSize:13}}/>
                    <input type="number" value={item.unitPrice||0} onChange={e=>setItem(item.id,'unitPrice',Number(e.target.value))} style={{textAlign:'right',fontSize:13}}/>
                    <div style={{textAlign:'right',fontSize:12,color:'var(--teal)',fontFamily:"'JetBrains Mono',monospace",padding:'0 4px'}}>{((item.qty||1)*(item.unitPrice||0)).toLocaleString()}</div>
                    <button onClick={()=>removeItem(item.id)} style={{background:'transparent',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:14}}>×</button>
                  </div>
                ))}
                <div style={{padding:'6px 10px',borderBottom:'1px solid var(--border)'}}>
                  <button className="btn ghost sm" style={{width:'100%',justifyContent:'center'}} onClick={addItem}>+ 품목 추가</button>
                </div>
                <div style={{padding:'8px 14px',display:'flex',justifyContent:'flex-end',gap:12,fontSize:13}}>
                  <span style={{color:'var(--text2)'}}>KRW 합계</span>
                  <span style={{fontWeight:700,color:'var(--teal)',fontFamily:"'JetBrains Mono',monospace"}}>₩{formTotal.toLocaleString()}</span>
                </div>
              </div>
            </div>

            {/* 매출 예정일 편집 */}
            <div style={{marginBottom:14}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <label style={{margin:0}}>매출 예정일</label>
                <button className="btn ghost sm" onClick={addPay}>+ 추가</button>
              </div>
              {(form.paySchedule||[]).length===0
                ?<div style={{fontSize:12,color:'var(--text3)',padding:'8px',background:'var(--bg3)',borderRadius:'var(--r)',textAlign:'center'}}>없음</div>
                :(form.paySchedule||[]).map(ps=>(
                  <div key={ps.id} style={{display:'grid',gridTemplateColumns:'80px 1fr 130px 28px',gap:6,marginBottom:6,alignItems:'center'}}>
                    <select value={ps.type||'선금'} onChange={e=>setPay(ps.id,'type',e.target.value)} style={{fontSize:12}}>
                      {['선금','중도금','잔금','일시불','기타'].map(t=><option key={t}>{t}</option>)}
                    </select>
                    <input type="date" value={ps.date||''} onChange={e=>setPay(ps.id,'date',e.target.value)} style={{fontSize:13}}/>
                    <input type="number" value={ps.amount||0} onChange={e=>setPay(ps.id,'amount',Number(e.target.value))} style={{fontSize:13,textAlign:'right'}}/>
                    <button onClick={()=>removePay(ps.id)} style={{background:'transparent',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:14}}>×</button>
                  </div>
                ))}
            </div>

            <div style={{display:'flex',justifyContent:'space-between',gap:8}}>
              <button className="btn danger sm" onClick={()=>{if(confirm('이 딜을 삭제하시겠습니까?'))onDelete()}}>삭제</button>
              <div style={{display:'flex',gap:8}}>
                <button className="btn ghost" onClick={()=>setEditing(false)}>취소</button>
                <button className="btn primary" onClick={saveEdit}>저장</button>
              </div>
            </div>
          </>
        ):(
          <>
            {/* 단계 이동 버튼 */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:12,color:'var(--text2)',marginBottom:8,fontWeight:500}}>단계 이동</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {(nextSales||nextPost)&&
                  <button className="btn sm primary" onClick={()=>onUpdate({stage:(nextSales||nextPost).id})}>
                    → {(nextSales||nextPost).label}
                  </button>}
                {!['holding','lost'].includes(deal.stage)&&
                  <button className="btn sm" style={{borderColor:'var(--amber)',color:'var(--amber)'}} onClick={()=>onUpdate({stage:'holding'})}>홀딩</button>}
                {deal.stage!=='lost'&&
                  <button className="btn sm" style={{borderColor:'var(--red)',color:'var(--red)'}} onClick={()=>onUpdate({stage:'lost'})}>실패</button>}
                {(deal.stage==='holding'||deal.stage==='lost')&&
                  <button className="btn sm" onClick={()=>onUpdate({stage:'lead'})}>재활성화</button>}
              </div>
            </div>

            {/* 탭 */}
            <div style={{display:'flex',gap:0,borderBottom:'1px solid var(--border)',marginBottom:16}}>
              {[['info','기본정보'],['notes','노트'],['history','이력']].map(([t,l])=>(
                <button key={t} onClick={()=>setTab(t)} style={{padding:'8px 16px',background:'transparent',border:'none',borderBottom:tab===t?'2px solid var(--accent)':'2px solid transparent',color:tab===t?'var(--text)':'var(--text2)',cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:tab===t?600:400,marginBottom:-1}}>
                  {l}{t==='notes'&&(deal.notes||[]).length>0&&<span style={{marginLeft:4,background:'var(--bg4)',borderRadius:10,fontSize:10,padding:'1px 5px',color:'var(--text2)'}}>{(deal.notes||[]).length}</span>}
                </button>
              ))}
            </div>

            {tab==='info'&&(
              <div>
                {/* 품목 테이블 */}
                {(deal.items||[]).filter(i=>i.name||i.unitPrice>0).length>0&&(
                  <div style={{marginBottom:16,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'var(--r)',overflow:'hidden'}}>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 60px 120px 120px',padding:'6px 12px',borderBottom:'1px solid var(--border)',fontSize:11,color:'var(--text3)'}}>
                      <span>품목</span><span style={{textAlign:'center'}}>수량</span><span style={{textAlign:'right'}}>단가</span><span style={{textAlign:'right'}}>합계</span>
                    </div>
                    {(deal.items||[]).map(item=>(
                      <div key={item.id} style={{display:'grid',gridTemplateColumns:'1fr 60px 120px 120px',padding:'8px 12px',borderBottom:'1px solid var(--border)',fontSize:13}}>
                        <span style={{fontWeight:500}}>{item.name||'-'}</span>
                        <span style={{textAlign:'center',color:'var(--text2)'}}>{item.qty||1}</span>
                        <span style={{textAlign:'right',color:'var(--text2)',fontFamily:"'JetBrains Mono',monospace"}}>{(item.unitPrice||0).toLocaleString()}</span>
                        <span style={{textAlign:'right',fontWeight:600,color:'var(--teal)',fontFamily:"'JetBrains Mono',monospace"}}>{((item.qty||1)*(item.unitPrice||0)).toLocaleString()}</span>
                      </div>
                    ))}
                    <div style={{padding:'8px 12px',display:'flex',justifyContent:'flex-end',gap:12,fontSize:13}}>
                      <span style={{color:'var(--text2)'}}>KRW 합계</span>
                      <span style={{fontWeight:700,color:'var(--teal)',fontFamily:"'JetBrains Mono',monospace"}}>₩{total.toLocaleString()}</span>
                    </div>
                  </div>
                )}

                {/* 기본 정보 그리드 */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
                  {[['고객사',deal.company||'-'],['담당자',deal.contact||'-'],['연락처',deal.phone||'-'],['영업 담당',deal.salesPerson],['등록일',deal.createdAt],['단계 진입일',deal.stageEnteredAt]].map(([k,v])=>(
                    <div key={k} style={{background:'var(--bg3)',borderRadius:6,padding:'8px 10px'}}>
                      <div style={{fontSize:11,color:'var(--text3)',marginBottom:2}}>{k}</div>
                      <div style={{fontSize:13,fontWeight:500}}>{v}</div>
                    </div>
                  ))}
                </div>

                {/* 매출 예정일 */}
                {(deal.paySchedule||[]).length>0&&(
                  <div>
                    <div style={{fontSize:12,color:'var(--text2)',marginBottom:8,fontWeight:500}}>매출 예정일</div>
                    {(deal.paySchedule||[]).map(ps=>(
                      <div key={ps.id} style={{display:'flex',alignItems:'center',gap:12,padding:'8px 12px',background:'var(--bg3)',borderRadius:6,marginBottom:6}}>
                        <span style={{background:ps.type==='선금'?'var(--amber)22':'var(--blue)22',color:ps.type==='선금'?'var(--amber)':'var(--blue)',fontSize:11,padding:'2px 8px',borderRadius:4,fontWeight:500,flexShrink:0}}>{ps.type||'미정'}</span>
                        <span style={{color:'var(--text2)',fontSize:13}}>{ps.date||'날짜 미입력'}</span>
                        <span style={{marginLeft:'auto',fontWeight:600,color:'var(--teal)',fontFamily:"'JetBrains Mono',monospace",fontSize:13}}>₩{(ps.amount||0).toLocaleString()}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {tab==='notes'&&(
              <div>
                <div style={{display:'flex',gap:8,marginBottom:14}}>
                  <textarea value={newNote} onChange={e=>setNewNote(e.target.value)}
                    placeholder="활동 내용, 통화 메모, 다음 액션 등 자유롭게 작성..."
                    style={{flex:1,minHeight:72,fontSize:13}}
                    onKeyDown={e=>e.key==='Enter'&&e.ctrlKey&&addNote()}/>
                  <div style={{display:'flex',flexDirection:'column',gap:6}}>
                    <button className="btn primary sm" disabled={!newNote.trim()} onClick={addNote} style={{height:36}}>추가</button>
                    <div style={{fontSize:10,color:'var(--text3)',textAlign:'center'}}>Ctrl+Enter</div>
                  </div>
                </div>
                {(deal.notes||[]).length===0
                  ?<div style={{color:'var(--text3)',fontSize:13,padding:'16px',textAlign:'center',background:'var(--bg3)',borderRadius:'var(--r)'}}>작성된 노트 없음</div>
                  :[...(deal.notes||[])].reverse().map(n=>(
                    <div key={n.id} style={{background:'var(--bg3)',borderRadius:'var(--r)',padding:'12px 14px',marginBottom:8,position:'relative'}}>
                      <div style={{fontSize:11,color:'var(--text3)',marginBottom:6}}>{n.date}</div>
                      <div style={{fontSize:13,lineHeight:1.6,whiteSpace:'pre-wrap'}}>{n.text}</div>
                      <button onClick={()=>deleteNote(n.id)} style={{position:'absolute',top:8,right:8,background:'transparent',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:13,padding:'2px 6px'}}>×</button>
                    </div>
                  ))}
              </div>
            )}

            {tab==='history'&&(
              <div>
                {(deal.history||[]).length===0
                  ?<div style={{color:'var(--text3)',fontSize:13}}>단계 변경 이력 없음</div>
                  :[...(deal.history||[])].reverse().map((h,i)=>(
                    <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid var(--border)',fontSize:13}}>
                      <span style={{fontSize:11,color:'var(--text3)',flexShrink:0,width:80}}>{h.date}</span>
                      <span style={{background:stageColor(h.from)+'22',color:stageColor(h.from),fontSize:11,padding:'2px 8px',borderRadius:4}}>{getLabel(h.from)}</span>
                      <span style={{color:'var(--text3)'}}>→</span>
                      <span style={{background:stageColor(h.to)+'22',color:stageColor(h.to),fontSize:11,padding:'2px 8px',borderRadius:4}}>{getLabel(h.to)}</span>
                      {h.note&&<span style={{fontSize:11,color:'var(--text3)'}}>{h.note}</span>}
                    </div>
                  ))}
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

/* ── Settings ────────────────────────────────────────────── */
function Settings({settings,setSettings}){
  const stages=[...SALES_STAGES.filter(s=>!['holding','lost'].includes(s.id)),...POST_STAGES.filter(s=>s.id!=='delivery')];
  return(
    <div style={{maxWidth:600}}>
      <div style={{fontSize:16,fontWeight:600,marginBottom:6}}>알람 설정</div>
      <div style={{fontSize:13,color:'var(--text2)',marginBottom:20}}>단계별 자동 홀딩 기준 일수 (초과 시 홀딩으로 이동)</div>
      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--r2)',overflow:'hidden'}}>
        {stages.map((s,i)=>(
          <div key={s.id} style={{display:'flex',alignItems:'center',gap:16,padding:'12px 16px',borderBottom:i<stages.length-1?'1px solid var(--border)':'none'}}>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:500}}>{s.label}</div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:1}}>{s.sub}</div>
            </div>
            <input type="range" min={7} max={90} step={1} value={settings[s.id]||30}
              onChange={e=>setSettings(p=>({...p,[s.id]:Number(e.target.value)}))}
              style={{width:100}}/>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:600,color:'var(--accent)',width:48,textAlign:'right'}}>{settings[s.id]||30}일</div>
            <button className="btn ghost sm" onClick={()=>setSettings(p=>({...p,[s.id]:30}))}>초기화</button>
          </div>
        ))}
      </div>
      <div style={{marginTop:16,padding:'12px 16px',background:'var(--bg3)',borderRadius:'var(--r)',fontSize:12,color:'var(--text2)',lineHeight:1.7}}>
        <strong style={{color:'var(--text)'}}>알람 기준</strong><br/>
        · 설정 일수 30% → 주의 (카드 바 색상)<br/>
        · 설정 일수 60% → 경고 (대시보드 알람 등장)<br/>
        · 설정 일수 100% → 자동 홀딩 이동
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
