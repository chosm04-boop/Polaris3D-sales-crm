<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>POMS — Post-Order Management System</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c10;--bg2:#0e1318;--bg3:#141b22;--bg4:#1a2330;--bg5:#1f2a38;
  --border:#1e2d3d;--border2:#243447;--border3:#2d4057;
  --text:#e2eaf2;--text2:#7a93aa;--text3:#445566;
  --accent:#00d4ff;--accent2:#0099cc;--accent-dim:#00d4ff18;
  --green:#00e699;--green2:#00b377;--green-dim:#00e69918;
  --amber:#ffb800;--amber2:#cc9200;--amber-dim:#ffb80018;
  --red:#ff4757;--red2:#cc2233;--red-dim:#ff475718;
  --purple:#9d7fff;--purple2:#7a5fd9;--purple-dim:#9d7fff18;
  --blue:#4d9fff;--blue-dim:#4d9fff18;
  --teal:#00c9b1;--teal-dim:#00c9b118;
  --r:6px;--r2:10px;--r3:14px;
}
html,body{height:100%;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;-webkit-font-smoothing:antialiased}
#root{height:100%;display:flex;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:3px}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;letter-spacing:.01em}
.btn:hover{background:var(--bg4);border-color:var(--border3)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
.btn.primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--text2)}
.btn.ghost:hover{background:var(--bg3);color:var(--text)}
.btn.danger{background:transparent;border-color:var(--red);color:var(--red)}
.btn.danger:hover{background:var(--red);color:#fff}
.btn.sm{padding:4px 10px;font-size:12px}
.btn.xs{padding:3px 8px;font-size:11px}
/* Inputs */
input,select,textarea{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:14px;border-radius:var(--r);padding:9px 12px;outline:none;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:72px;line-height:1.6}
label{font-size:12px;color:var(--text2);font-weight:600;display:block;margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase}
.field{margin-bottom:14px}
/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:20px}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r3);padding:24px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto}
.modal-lg{max-width:780px}
.modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:700;letter-spacing:-.02em}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:4px;font-size:12px;font-weight:600;letter-spacing:.02em;white-space:nowrap}
/* Phase colors */
.ph-sales{color:#a78bfa;background:#a78bfa18;border-color:#a78bfa30}
.ph-spec{color:#00d4ff;background:#00d4ff18;border-color:#00d4ff30}
.ph-prod{color:#4d9fff;background:#4d9fff18;border-color:#4d9fff30}
.ph-ship{color:#ffb800;background:#ffb80018;border-color:#ffb80030}
.ph-post{color:#00e699;background:#00e69918;border-color:#00e69930}
.ph-cr{color:#ff4757;background:#ff475718;border-color:#ff475730}
/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:10px 18px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text2);cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--text);background:var(--bg3)}
/* Alert banner */
.alert-banner{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:var(--r);margin-bottom:8px;font-size:12px;line-height:1.5}
/* Grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
/* Divider */
hr{border:none;border-top:1px solid var(--border);margin:16px 0}
/* Mono */
.mono{font-family:'DM Mono',monospace}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useMemo,useCallback,useRef} = React;

/* ── 상수 정의 ─────────────────────────────────────────── */

const PHASES = [
  { id:'spec',  label:'사양 확정', color:'#00d4ff', en:'Specification' },
  { id:'prod',  label:'개발·생산', color:'#4d9fff', en:'Production' },
  { id:'ship',  label:'출하·납품', color:'#ffb800', en:'Shipment' },
  { id:'post',  label:'납품 후',   color:'#00e699', en:'Post-Delivery' },
];

const POMS_STAGES = [
  // Phase: 사양 확정
  { id:'loi',         label:'LOI 접수',          en:'Letter of Intent',     phase:'spec', owner:'영업',    days:14, gate:false },
  { id:'rfq',         label:'RFQ 분석',           en:'Requirement Analysis', phase:'spec', owner:'영업',    days:10, gate:false },
  { id:'feasibility', label:'Feasibility Review', en:'기술 타당성 검토',      phase:'spec', owner:'개발',    days:14, gate:false },
  { id:'spec_nego',   label:'Spec. Negotiation',  en:'사양 협의',             phase:'spec', owner:'영업',    days:14, gate:false },
  { id:'spec_freeze', label:'Spec. Freeze',       en:'사양 동결',             phase:'spec', owner:'영업',    days:7,  gate:true  },
  { id:'po_receipt',  label:'PO Receipt',         en:'발주서 수령',           phase:'spec', owner:'영업',    days:7,  gate:true  },
  // Phase: 개발·생산
  { id:'bom',         label:'BOM Release',        en:'BOM 확정',             phase:'prod', owner:'개발',    days:14, gate:false },
  { id:'mfg',         label:'Manufacturing',      en:'제작',                  phase:'prod', owner:'생산',    days:30, gate:false },
  { id:'burnin',      label:'Burn-in Test',       en:'번인 테스트',           phase:'prod', owner:'품질',    days:7,  gate:false },
  { id:'qc_fat',      label:'QC / FAT',           en:'품질검증·입회검사',     phase:'prod', owner:'품질',    days:7,  gate:true  },
  // Phase: 출하·납품
  { id:'shipping',    label:'Shipping Readiness', en:'출하 준비',             phase:'ship', owner:'품질',    days:5,  gate:false },
  { id:'delivery',    label:'Delivery Acceptance',en:'납품 검수',             phase:'ship', owner:'영업',    days:5,  gate:true  },
  // Phase: 납품 후
  { id:'commission',  label:'Commissioning',      en:'설치·시운전',           phase:'post', owner:'서비스',  days:14, gate:false },
  { id:'stabilize',   label:'Stabilization',      en:'운영 안정화',           phase:'post', owner:'서비스',  days:14, gate:false },
  { id:'closeout',    label:'Project Close-out',  en:'프로젝트 완료',         phase:'post', owner:'영업',    days:5,  gate:true  },
];

const DEPARTMENTS_DEFAULT = [
  { id:'sales',    label:'영업',   color:'#a78bfa', en:'Sales' },
  { id:'dev',      label:'개발',   color:'#4d9fff', en:'R&D' },
  { id:'mfg',      label:'생산',   color:'#7ec8e3', en:'Manufacturing' },
  { id:'qa',       label:'품질',   color:'#ffb800', en:'QC/QA' },
  { id:'purchase', label:'구매',   color:'#9d7fff', en:'Procurement' },
  { id:'service',  label:'서비스', color:'#00e699', en:'Field Service' },
];

const CR_STATUSES = [
  { id:'open',     label:'접수됨',     color:'#a78bfa' },
  { id:'review',   label:'검토중',     color:'#ffb800' },
  { id:'pending',  label:'승인대기',   color:'#4d9fff' },
  { id:'approved', label:'승인완료',   color:'#00e699' },
  { id:'rejected', label:'반려',       color:'#ff4757' },
];

function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2) }
function today(){ return new Date().toISOString().slice(0,10) }
function daysDiff(d){ if(!d)return 0; return Math.floor((Date.now()-new Date(d))/86400000) }
function fmt(n){
  if(!n||n===0)return '₩0';
  if(n>=100000000)return `${(n/100000000).toFixed(1)}억`;
  if(n>=10000)return `${Math.round(n/10000).toLocaleString()}만`;
  return `₩${n.toLocaleString()}`;
}
function fmtFull(n){ return n?`₩${Number(n).toLocaleString()}`:'-' }

/* ── Storage ─────────────────────────────────────────── */
function useStorage(key,init){
  const [val,setVal]=useState(()=>{
    try{ const s=localStorage.getItem(key); return s?JSON.parse(s):init }
    catch{ return init }
  });
  const set=useCallback(v=>{
    setVal(prev=>{
      const next=typeof v==='function'?v(prev):v;
      localStorage.setItem(key,JSON.stringify(next));
      return next;
    });
  },[key]);
  return[val,set];
}

/* ── 단계 유틸 ───────────────────────────────────────── */
function stageInfo(id){ return POMS_STAGES.find(s=>s.id===id)||{label:id,color:'#445566',phase:'spec',owner:'',days:14} }
function phaseInfo(id){ return PHASES.find(p=>p.id===id)||{label:id,color:'#445566'} }
function phaseColor(phaseId){
  const m={spec:'#00d4ff',prod:'#4d9fff',ship:'#ffb800',post:'#00e699'};
  return m[phaseId]||'#445566';
}
function alertLevel(proj, alertCfg){
  if(['closeout','cancelled'].includes(proj.stage)) return null;
  const si = stageInfo(proj.stage);
  const days = daysDiff(proj.stageEnteredAt);
  const limit = alertCfg[proj.stage] || si.days || 14;
  if(days >= limit) return 'over';
  if(days >= limit * 0.7) return 'warn';
  if(days >= limit * 0.4) return 'caution';
  return null;
}
function projectTotal(proj){
  return (proj.units||[]).reduce((a,u)=>{
    return a+(u.items||[]).reduce((b,i)=>b+(i.qty||1)*(i.unitPrice||0),0);
  },0);
}

/* ── App ─────────────────────────────────────────────── */
function App(){
  const [projects,setProjects]=useStorage('poms_projects',[]);
  const [depts,setDepts]=useStorage('poms_depts',DEPARTMENTS_DEFAULT);
  const [alertCfg,setAlertCfg]=useStorage('poms_alerts',
    Object.fromEntries(POMS_STAGES.map(s=>[s.id,s.days])));
  const [members,setMembers]=useStorage('poms_members',[]);
  const [view,setView]=useState('dashboard');
  const [modal,setModal]=useState(null);
  const [selected,setSelected]=useState(null);
  const [filterDept,setFilterDept]=useState('전체');
  const [filterStage,setFilterStage]=useState('전체');
  const [search,setSearch]=useState('');

  // 자동 알람 체크 (단계 초과 시)
  useEffect(()=>{
    // 실시간 알람은 대시보드에서 표시
  },[]);

  const filtered=useMemo(()=>{
    return projects.filter(p=>{
      if(search && !p.name?.toLowerCase().includes(search.toLowerCase()) &&
         !p.customer?.toLowerCase().includes(search.toLowerCase())) return false;
      if(filterStage!=='전체' && p.stage!==filterStage) return false;
      return true;
    });
  },[projects,search,filterStage]);

  function addProject(data){
    setProjects(p=>[{
      id:genId(),createdAt:today(),stageEnteredAt:today(),
      stage:'loi',history:[],crs:[],notes:[],
      units:[],assignments:{},
      ...data
    },...p]);
  }
  function updateProject(id,data){
    setProjects(p=>p.map(proj=>{
      if(proj.id!==id)return proj;
      const sc=data.stage&&data.stage!==proj.stage;
      return{
        ...proj,...data,
        stageEnteredAt:sc?today():proj.stageEnteredAt,
        history:sc?[...(proj.history||[]),{
          date:new Date().toLocaleString('ko-KR'),
          from:proj.stage,to:data.stage,note:data._note||''
        }]:proj.history||[]
      };
    }));
  }
  function deleteProject(id){ setProjects(p=>p.filter(pr=>pr.id!==id)) }

  function open(proj){ setSelected(proj); setModal('detail') }

  const overdue=useMemo(()=>
    filtered.filter(p=>alertLevel(p,alertCfg)==='over'||alertLevel(p,alertCfg)==='warn'),
  [filtered,alertCfg]);

  const crPending=useMemo(()=>
    projects.filter(p=>(p.crs||[]).some(c=>['open','review','pending'].includes(c.status))),
  [projects]);

  return(
    <div style={{display:'flex',width:'100vw',height:'100vh',background:'var(--bg)',overflow:'hidden'}}>
      <Sidebar view={view} setView={setView} overdueCount={overdue.length} crCount={crPending.length}/>
      <div style={{flex:1,width:0,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <TopBar search={search} setSearch={setSearch}
          filterStage={filterStage} setFilterStage={setFilterStage}
          onNew={()=>setModal('new')}/>
        <div style={{flex:1,overflow:'auto',padding:'28px 32px',width:'100%'}}>
          {view==='dashboard' && <Dashboard projects={filtered} alertCfg={alertCfg} onOpen={open} overdue={overdue} crPending={crPending}/>}
          {view==='projects' && <ProjectBoard projects={filtered} alertCfg={alertCfg} onOpen={open}/>}
          {view==='pipeline' && <PipelineView projects={filtered} alertCfg={alertCfg} onOpen={open}/>}
          {view==='documents'&&<DocumentsView projects={projects} onOpen={open} onUpdate={(id,data)=>updateProject(id,data)}/>}
          {view==='timeline'&&<TimelineView projects={projects} onOpen={open}/>}
          {view==='team'&&<TeamView projects={projects} members={members} depts={depts} onOpen={open}/>}
          {view==='settings' && <Settings alertCfg={alertCfg} setAlertCfg={setAlertCfg} depts={depts} setDepts={setDepts} members={members} setMembers={setMembers}/>}
        </div>
      </div>

      {modal==='new' && <ProjectModal onClose={()=>setModal(null)} onSave={d=>{addProject(d);setModal(null)}} members={members} depts={depts}/>}
      {modal==='detail' && selected &&
        <ProjectDetail
          project={projects.find(p=>p.id===selected.id)||selected}
          alertCfg={alertCfg} members={members} depts={depts}
          onClose={()=>{setModal(null);setSelected(null)}}
          onUpdate={data=>updateProject(selected.id,data)}
          onDelete={()=>{deleteProject(selected.id);setModal(null);setSelected(null)}}
        />}
    </div>
  );
}

/* ── Sidebar ─────────────────────────────────────────── */
function Sidebar({view,setView,overdueCount,crCount}){
  const nav=[
    {id:'dashboard',icon:'◉',label:'Dashboard'},
    {id:'projects', icon:'◈',label:'Projects'},
    {id:'pipeline', icon:'▣',label:'Pipeline'},
    {id:'documents',icon:'◻',label:'Documents'},
    {id:'timeline', icon:'◷',label:'Timeline'},
    {id:'team',     icon:'◎',label:'Team'},
    {id:'settings', icon:'⚙',label:'Settings'},
  ];
  return(
    <div style={{width:216,background:'var(--bg2)',borderRight:'1px solid var(--border)',
      display:'flex',flexDirection:'column',flexShrink:0}}>
      {/* Logo */}
      <div style={{padding:'20px 16px 16px',borderBottom:'1px solid var(--border)'}}>
        <div style={{fontSize:20,fontWeight:800,letterSpacing:'-.04em',
          background:'linear-gradient(135deg, #00d4ff, #00e699)',
          WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>POMS</div>
        <div style={{fontSize:10,color:'var(--text3)',marginTop:2,letterSpacing:'.08em',textTransform:'uppercase'}}>
          Post-Order Mgmt
        </div>
      </div>
      {/* Nav */}
      <div style={{padding:'8px 0',flex:1,overflowY:'auto'}}>
        {nav.map(n=>(
          <button key={n.id} onClick={()=>setView(n.id)}
            style={{display:'flex',alignItems:'center',gap:10,padding:'11px 18px',
              background:view===n.id?'var(--bg3)':'transparent',
              border:'none',borderLeft:view===n.id?`2px solid var(--accent)`:'2px solid transparent',
              color:view===n.id?'var(--text)':'var(--text2)',
              cursor:'pointer',fontSize:14,fontFamily:'inherit',
              transition:'all .1s',textAlign:'left',width:'100%'}}>
            <span style={{fontSize:13,opacity:.8}}>{n.icon}</span>
            <span style={{fontWeight:view===n.id?600:400}}>{n.label}</span>
            {n.id==='dashboard'&&overdueCount>0&&
              <span style={{marginLeft:'auto',background:'var(--red)',color:'#fff',
                fontSize:10,fontWeight:700,borderRadius:10,padding:'1px 6px',minWidth:18,textAlign:'center'}}>
                {overdueCount}
              </span>}
            {n.id==='projects'&&crCount>0&&
              <span style={{marginLeft:'auto',background:'var(--amber)',color:'#000',
                fontSize:10,fontWeight:700,borderRadius:10,padding:'1px 6px',minWidth:18,textAlign:'center'}}>
                {crCount}
              </span>}
          </button>
        ))}
      </div>
      <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)',
        fontSize:10,color:'var(--text3)',letterSpacing:'.04em'}}>
        v1.0 · AMR Sales
      </div>
    </div>
  );
}

/* ── TopBar ──────────────────────────────────────────── */
function TopBar({search,setSearch,filterStage,setFilterStage,onNew}){
  return(
    <div style={{padding:'10px 20px',borderBottom:'1px solid var(--border)',
      display:'flex',alignItems:'center',gap:10,background:'var(--bg2)',flexShrink:0}}>
      <input placeholder="프로젝트명·고객사 검색" value={search}
        onChange={e=>setSearch(e.target.value)} style={{width:220}}/>
      <select value={filterStage} onChange={e=>setFilterStage(e.target.value)} style={{width:160}}>
        <option>전체</option>
        {POMS_STAGES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
      </select>
      <div style={{marginLeft:'auto'}}>
        <button className="btn primary" onClick={onNew}>+ 프로젝트 추가</button>
      </div>
    </div>
  );
}

/* ── Dashboard ───────────────────────────────────────── */
function Dashboard({projects,alertCfg,onOpen,overdue,crPending}){
  const active=projects.filter(p=>p.stage!=='closeout'&&p.stage!=='cancelled');
  const totalAmt=active.reduce((a,p)=>a+projectTotal(p),0);
  const thisMonth=new Date().toISOString().slice(0,7);
  const deliveryThisMonth=projects.filter(p=>{
    const ps=(p.paySchedule||[]);
    return ps.some(s=>s.date&&s.date.slice(0,7)===thisMonth);
  });

  // 단계별 분포
  const stageMap={};
  POMS_STAGES.forEach(s=>{stageMap[s.id]=projects.filter(p=>p.stage===s.id).length});

  // 고객사별 수주액
  const custMap={};
  projects.forEach(p=>{
    if(!p.customer)return;
    if(!custMap[p.customer])custMap[p.customer]=0;
    custMap[p.customer]+=projectTotal(p);
  });
  const custRank=Object.entries(custMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxCust=custRank[0]?.[1]||1;

  return(
    <div style={{display:'flex',flexDirection:'column',gap:24,width:'100%'}}>
      {/* 알람 배너 */}
      {overdue.length>0&&(
        <div style={{background:'var(--red-dim)',border:'1px solid #ff475740',borderRadius:'var(--r2)',padding:'12px 16px'}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--red)',marginBottom:8,display:'flex',alignItems:'center',gap:8}}>
            <span>🔴</span> 확인 필요 — {overdue.length}건의 프로젝트가 단계 체류 기한을 초과했습니다
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {overdue.slice(0,4).map(p=>{
              const si=stageInfo(p.stage);
              const days=daysDiff(p.stageEnteredAt);
              const limit=alertCfg[p.stage]||si.days;
              const assignee=Object.values(p.assignments||{})[0]||'담당자 미배정';
              return(
                <div key={p.id} onClick={()=>onOpen(p)}
                  style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',
                    background:'rgba(0,0,0,.3)',borderRadius:'var(--r)',padding:'8px 12px'}}>
                  <div style={{width:7,height:7,borderRadius:'50%',background:'var(--red)',flexShrink:0}}/>
                  <span style={{fontWeight:600,fontSize:13,flex:1}}>{p.name}</span>
                  <span style={{fontSize:11,color:'var(--text2)'}}>{si.label}</span>
                  <span style={{fontSize:11,color:'var(--text2)'}}>{assignee}</span>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--red)',fontFamily:"'DM Mono',monospace"}}>
                    {days}/{limit}일
                  </span>

            const phProjects=projects.filter(p=>phStages.some(s=>s.id===p.stage));

      {/* 최근 프로젝트 */}

/* ── ProjectTable ────────────────────────────────────── */
function ProjectTable({projects,alertCfg,onOpen}){
  if(projects.length===0) return(
    <div style={{color:'var(--text3)',fontSize:13,padding:'16px',textAlign:'center'}}>
      프로젝트 없음 — 상단 "+ 프로젝트 추가" 버튼으로 추가하세요
    </div>
  );
  return(
    <table style={{width:'100%',borderCollapse:'collapse',fontSize:14}}>
      <thead>
        <tr style={{borderBottom:'1px solid var(--border)'}}>
          {['프로젝트','고객사','단계','담당자','금액','체류','CR','알람'].map(h=>(
            <th key={h} style={{padding:'6px 10px',textAlign:'left',fontSize:11,
              color:'var(--text2)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.04em'}}>{h}</th>
          ))}
        </tr>
      </thead>
      <tbody>
        {projects.map(p=>{
          const si=stageInfo(p.stage);
          const ph=phaseInfo(si.phase);
          const days=daysDiff(p.stageEnteredAt);
          const limit=alertCfg[p.stage]||si.days;
          const al=alertLevel(p,alertCfg);
          const amt=projectTotal(p);
          const pendingCR=(p.crs||[]).filter(c=>['open','review','pending'].includes(c.status)).length;
          const assignee=p.assignments?.[p.stage]||'—';
          return(
            <tr key={p.id} onClick={()=>onOpen(p)}
              style={{borderBottom:'1px solid var(--border)',cursor:'pointer',
                transition:'background .1s'}}
              onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <td style={{padding:'11px 12px',fontWeight:600,fontSize:14}}>{p.name}</td>
              <td style={{padding:'11px 12px',color:'var(--text2)',fontSize:14}}>{p.customer||'—'}</td>
              <td style={{padding:'9px 10px'}}>
                <span className="badge" style={{background:phaseColor(si.phase)+'20',
                  color:phaseColor(si.phase),border:`1px solid ${phaseColor(si.phase)}30`}}>
                  {si.label}
                </span>
              </td>
              <td style={{padding:'9px 10px',color:'var(--text2)',fontSize:12}}>{assignee}</td>
              <td style={{padding:'9px 10px',fontFamily:"'DM Mono',monospace",color:'var(--green)',fontSize:12}}>
                {amt>0?fmt(amt):'—'}
              </td>
              <td style={{padding:'9px 10px'}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <div style={{width:40,height:3,background:'var(--bg4)',borderRadius:2,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${Math.min((days/limit)*100,100)}%`,
                      background:al==='over'?'var(--red)':al==='warn'?'var(--amber)':'var(--accent)',
                      borderRadius:2}}/>
                  </div>
                  <span style={{fontSize:11,color:al?'var(--amber)':'var(--text3)',
                    fontFamily:"'DM Mono',monospace"}}>{days}d</span>
                </div>
              </td>
              <td style={{padding:'9px 10px'}}>
                {pendingCR>0&&
                  <span style={{background:'var(--amber-dim)',color:'var(--amber)',
                    fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:4}}>CR×{pendingCR}</span>}
              </td>
              <td style={{padding:'9px 10px'}}>
                {al==='over'&&<span style={{color:'var(--red)',fontSize:12}}>🔴</span>}
                {al==='warn'&&<span style={{color:'var(--amber)',fontSize:12}}>🟡</span>}
              </td>
            </tr>
          );
        })}
      </tbody>
    </table>
  );
}

/* ── ProjectBoard (카드 뷰) ──────────────────────────── */
function ProjectBoard({projects,alertCfg,onOpen}){
  return(
    <div>
      <div style={{fontSize:14,fontWeight:600,marginBottom:16}}>
        Projects <span style={{fontSize:12,color:'var(--text2)',fontWeight:400,marginLeft:6}}>{projects.length}건</span>
      </div>
      {PHASES.map(ph=>{
        const phStages=POMS_STAGES.filter(s=>s.phase===ph.id);
        const phProjects=projects.filter(p=>phStages.some(s=>s.id===p.stage));
        if(phProjects.length===0)return null;
        return(
          <div key={ph.id} style={{marginBottom:24}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:ph.color}}/>
              <span style={{fontSize:12,fontWeight:700,color:ph.color,textTransform:'uppercase',letterSpacing:'.06em'}}>
                {ph.label} — {ph.en}
              </span>
              <span style={{fontSize:11,color:'var(--text3)'}}>{phProjects.length}건</span>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:10}}>
              {phProjects.map(p=><ProjectCard key={p.id} project={p} alertCfg={alertCfg} onOpen={onOpen}/>)}

      {projects.length===0&&
        <div style={{color:'var(--text3)',fontSize:13,padding:'40px',textAlign:'center'}}>

}

function ProjectCard({project:p,alertCfg,onOpen}){
  const si=stageInfo(p.stage);
  const days=daysDiff(p.stageEnteredAt);
  const limit=alertCfg[p.stage]||si.days;
  const al=alertLevel(p,alertCfg);
  const pct=Math.min((days/limit)*100,100);
  const amt=projectTotal(p);
  const pendingCR=(p.crs||[]).filter(c=>['open','review','pending'].includes(c.status)).length;
  const pc=phaseColor(si.phase);
  return(
    <div onClick={()=>onOpen(p)}
      style={{background:'var(--bg2)',border:`1px solid var(--border)`,
        borderLeft:`3px solid ${al==='over'?'var(--red)':al==='warn'?'var(--amber)':pc}`,
        borderRadius:'var(--r2)',padding:'14px 16px',cursor:'pointer',transition:'all .15s'}}
      onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'}
      onMouseLeave={e=>e.currentTarget.style.background='var(--bg2)'}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
        <div style={{fontWeight:600,fontSize:15,flex:1,marginRight:8,lineHeight:1.3}}>{p.name}</div>
        {pendingCR>0&&<span style={{background:'var(--amber-dim)',color:'var(--amber)',
          fontSize:10,fontWeight:700,padding:'2px 6px',borderRadius:3,flexShrink:0}}>CR×{pendingCR}</span>}
      </div>
      <div style={{fontSize:11,color:'var(--text2)',marginBottom:8,display:'flex',gap:8}}>
        <span>{p.customer||'고객사 미입력'}</span>
        {amt>0&&<span style={{color:'var(--green)',fontFamily:"'DM Mono',monospace"}}>{fmt(amt)}</span>}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
        <span className="badge" style={{background:pc+'20',color:pc,border:`1px solid ${pc}30`,fontSize:10}}>
          {si.label}
        </span>
        {si.gate&&<span style={{fontSize:10,color:'var(--text3)'}}>🔒</span>}
        {p.assignments?.[p.stage]&&
          <span style={{fontSize:11,color:'var(--text2)',marginLeft:'auto'}}>{p.assignments[p.stage]}</span>}
      </div>
      <div style={{background:'var(--bg4)',borderRadius:2,height:3}}>
        <div style={{height:'100%',borderRadius:2,
          background:al==='over'?'var(--red)':al==='warn'?'var(--amber)':'var(--accent)',
          width:`${pct}%`,transition:'width .3s'}}/>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:4,fontSize:10,color:'var(--text3)'}}>
        <span>{days}일 경과</span><span>기한 {limit}일</span>
      </div>
    </div>
  );
}

/* ── ProjectModal (새 프로젝트 추가) ─────────────────── */

  const [form,setForm]=useState({
    name:'',customer:'',salesPerson:'',stage:'loi',
    poNumber:'',deadline:'',notes:'',
    units:[{id:genId(),name:'호기 #1',items:[{id:genId(),name:'',qty:1,unitPrice:0}]}],
    paySchedule:[],assignments:{}
  });
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));

  function addUnit(){
    setForm(p=>({...p,units:[...p.units,{
      id:genId(),name:`호기 #${p.units.length+1}`,
      items:[{id:genId(),name:'',qty:1,unitPrice:0}]
    }]}));
  }
  function setUnit(uid,k,v){
    setForm(p=>({...p,units:p.units.map(u=>u.id===uid?{...u,[k]:v}:u)}));
  }
  function removeUnit(uid){
    setForm(p=>({...p,units:p.units.filter(u=>u.id!==uid)}));
  }
  function setItem(uid,iid,k,v){
    setForm(p=>({...p,units:p.units.map(u=>{
      if(u.id!==uid)return u;
      return{...u,items:u.items.map(i=>i.id===iid?{...i,[k]:v}:i)};
    })}));
  }
  function addItem(uid){
    setForm(p=>({...p,units:p.units.map(u=>{
      if(u.id!==uid)return u;
      return{...u,items:[...u.items,{id:genId(),name:'',qty:1,unitPrice:0}]};
    })}));
  }
  function removeItem(uid,iid){
    setForm(p=>({...p,units:p.units.map(u=>{
      if(u.id!==uid)return u;
      return{...u,items:u.items.filter(i=>i.id!==iid)};
    })}));
  }
  function addPay(){
    setForm(p=>({...p,paySchedule:[...p.paySchedule,{id:genId(),type:'선금',date:'',amount:0}]}));
  }
  function setPay(id,k,v){
    setForm(p=>({...p,paySchedule:p.paySchedule.map(ps=>ps.id===id?{...ps,[k]:v}:ps)}));
  }
  function removePay(id){
    setForm(p=>({...p,paySchedule:p.paySchedule.filter(ps=>ps.id!==id)}));
  }

  const totalAmt=form.units.reduce((a,u)=>
    a+u.items.reduce((b,i)=>b+(i.qty||1)*(i.unitPrice||0),0),0);

          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <label style={{margin:0}}>매출 예정일</label>
            <button className="btn ghost xs" onClick={addPay}>+ 추가</button>
          </div>
          {form.paySchedule.map(ps=>(
            <div key={ps.id} style={{display:'grid',gridTemplateColumns:'80px 1fr 130px 24px',
              gap:6,marginBottom:6,alignItems:'center'}}>
              <select value={ps.type||'선금'} onChange={e=>setPay(ps.id,'type',e.target.value)} style={{fontSize:12}}>
                {['선금','중도금','잔금','일시불','기타'].map(t=><option key={t}>{t}</option>)}
              </select>
              <input type="date" value={ps.date||''} onChange={e=>setPay(ps.id,'date',e.target.value)} style={{fontSize:13}}/>
              <input type="number" value={ps.amount||0} onChange={e=>setPay(ps.id,'amount',Number(e.target.value))}
                style={{textAlign:'right',fontSize:13}} placeholder="금액"/>
              <button onClick={()=>removePay(ps.id)}
                style={{background:'transparent',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:14}}>×</button>
            </div>
          ))}
          {form.paySchedule.length===0&&
            <div style={{fontSize:12,color:'var(--text3)',padding:'8px',textAlign:'center',
              background:'var(--bg3)',borderRadius:'var(--r)'}}>없음</div>}
        </div>

        <div className="field">
          <label>메모</label>
          <textarea value={form.notes} onChange={e=>set('notes',e.target.value)} style={{minHeight:60}}
            placeholder="특이사항, 고객 요구, 리스크 등"/>
        </div>

        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn ghost" onClick={onClose}>취소</button>
          <button className="btn primary" disabled={!form.name.trim()}
            onClick={()=>form.name.trim()&&onSave(form)}>저장</button>
        </div>
      </div>
    </div>
  );
}

/* ── ProjectDetail ───────────────────────────────────── */
function ProjectDetail({project:p,alertCfg,members,depts,onClose,onUpdate,onDelete}){
  const [tab,setTab]=useState('info');
  const [editing,setEditing]=useState(false);
  const [form,setForm]=useState({...p,
    units:p.units?.length?p.units:[{id:genId(),name:'호기 #1',items:[{id:genId(),name:'',qty:1,unitPrice:0}]}],
    paySchedule:p.paySchedule||[],assignments:p.assignments||{}});
  const [noteText,setNoteText]=useState('');
  const [crForm,setCrForm]=useState({title:'',desc:'',impact:''});
  const [showCrForm,setShowCrForm]=useState(false);
  const set=(k,v)=>setForm(pr=>({...pr,[k]:v}));

  const si=stageInfo(p.stage);
  const days=daysDiff(p.stageEnteredAt);
  const limit=alertCfg[p.stage]||si.days;
  const al=alertLevel(p,alertCfg);
  const pct=Math.min((days/limit)*100,100);
  const pc=phaseColor(si.phase);
  const amt=projectTotal(p);

  const allStageIdx=POMS_STAGES.findIndex(s=>s.id===p.stage);
  const nextStage=allStageIdx>=0&&allStageIdx<POMS_STAGES.length-1?POMS_STAGES[allStageIdx+1]:null;
  const prevStage=allStageIdx>0?POMS_STAGES[allStageIdx-1]:null;
  const pendingCR=(p.crs||[]).filter(c=>['open','review','pending'].includes(c.status));

  const memberOptions=members.map(m=>m.name);

  function addNote(){
    if(!noteText.trim())return;
    onUpdate({notes:[...(p.notes||[]),{id:genId(),date:new Date().toLocaleString('ko-KR'),text:noteText.trim()}]});
    setNoteText('');
  }
  function deleteNote(nid){ onUpdate({notes:(p.notes||[]).filter(n=>n.id!==nid)}) }

  function addCR(){
    if(!crForm.title.trim())return;
    const newCR={id:genId(),num:`CR-${String((p.crs||[]).length+1).padStart(3,'0')}`,
      date:today(),status:'open',...crForm};
    onUpdate({crs:[...(p.crs||[]),newCR]});
    setCrForm({title:'',desc:'',impact:''});
    setShowCrForm(false);
  }
  function updateCR(crid,data){
    onUpdate({crs:(p.crs||[]).map(c=>c.id===crid?{...c,...data}:c)});
  }

  function saveEdit(){ onUpdate({...form,_note:''}); setEditing(false) }

  // 호기 편집 함수들
  function setUnit(uid,k,v){setForm(pr=>({...pr,units:pr.units.map(u=>u.id===uid?{...u,[k]:v}:u)}))}
  function addUnit(){setForm(pr=>({...pr,units:[...pr.units,{id:genId(),name:`호기 #${pr.units.length+1}`,items:[{id:genId(),name:'',qty:1,unitPrice:0}]}]}))}
  function removeUnit(uid){setForm(pr=>({...pr,units:pr.units.filter(u=>u.id!==uid)}))}
  function setItem(uid,iid,k,v){setForm(pr=>({...pr,units:pr.units.map(u=>{if(u.id!==uid)return u;return{...u,items:u.items.map(i=>i.id===iid?{...i,[k]:v}:i)};})}))}
  function addItem(uid){setForm(pr=>({...pr,units:pr.units.map(u=>{if(u.id!==uid)return u;return{...u,items:[...u.items,{id:genId(),name:'',qty:1,unitPrice:0}]};})}));}
  function removeItem(uid,iid){setForm(pr=>({...pr,units:pr.units.map(u=>{if(u.id!==uid)return u;return{...u,items:u.items.filter(i=>i.id!==iid)};})}));}
  function addPay(){setForm(pr=>({...pr,paySchedule:[...pr.paySchedule,{id:genId(),type:'선금',date:'',amount:0}]}))}
  function setPay(id,k,v){setForm(pr=>({...pr,paySchedule:pr.paySchedule.map(ps=>ps.id===id?{...ps,[k]:v}:ps)}))}
  function removePay(id){setForm(pr=>({...pr,paySchedule:pr.paySchedule.filter(ps=>ps.id!==id)}))}

  const formTotal=form.units.reduce((a,u)=>a+u.items.reduce((b,i)=>b+(i.qty||1)*(i.unitPrice||0),0),0);

  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-lg" style={{maxWidth:720}}>
        {/* 헤더 */}
        <div className="modal-hdr" style={{marginBottom:12}}>
          <div>
            <div className="modal-title">{p.name}</div>
            <div style={{fontSize:12,color:'var(--text2)',marginTop:3,display:'flex',gap:12,flexWrap:'wrap'}}>
              {p.customer&&<span>{p.customer}</span>}
              {p.salesPerson&&<span>영업: {p.salesPerson}</span>}
              {p.poNumber&&<span>PO: {p.poNumber}</span>}
              {p.deadline&&<span>납기: {p.deadline}</span>}
              {amt>0&&<span style={{color:'var(--green)',fontFamily:"'DM Mono',monospace",fontWeight:600}}>{fmtFull(amt)}</span>}
            </div>
          </div>
          <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
            {pendingCR.length>0&&
              <span style={{background:'var(--amber-dim)',color:'var(--amber)',fontSize:11,fontWeight:700,
                padding:'3px 8px',borderRadius:4}}>CR×{pendingCR.length}</span>}
            <button className="btn sm" onClick={()=>setEditing(!editing)}>{editing?'취소':'수정'}</button>
            <button className="btn ghost" onClick={onClose}>✕</button>
          </div>
        </div>

        {/* 단계 + 체류 바 */}
        <div style={{background:'var(--bg3)',borderRadius:'var(--r)',padding:'10px 14px',marginBottom:14,
          border:`1px solid ${al?al==='over'?'var(--red)':'var(--amber)':'var(--border)'}`}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8,flexWrap:'wrap'}}>
            <span className="badge" style={{background:pc+'22',color:pc,border:`1px solid ${pc}30`}}>{si.label}</span>
            <span style={{fontSize:10,color:'var(--text3)',fontStyle:'italic'}}>{si.en}</span>
            {si.gate&&<span style={{fontSize:10,color:'var(--text3)'}}>🔒 게이트</span>}
            {al&&<span style={{fontSize:12,color:al==='over'?'var(--red)':'var(--amber)',fontWeight:600}}>
              {al==='over'?'⚠ 기한 초과':'⚠ 주의 필요'}
            </span>}
            <span style={{marginLeft:'auto',fontSize:12,color:'var(--text2)',fontFamily:"'DM Mono',monospace"}}>
              {days}일 / {limit}일
            </span>
          </div>
          <div style={{background:'var(--bg4)',borderRadius:3,height:5}}>
            <div style={{height:'100%',borderRadius:3,
              background:al==='over'?'var(--red)':al?'var(--amber)':'var(--accent)',
              width:`${pct}%`,transition:'width .3s'}}/>
          </div>
        </div>

        {/* 단계 이동 */}
        {!editing&&(
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:'var(--text2)',marginBottom:8,fontWeight:600,
              textTransform:'uppercase',letterSpacing:'.04em'}}>단계 이동</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {nextStage&&<button className="btn sm primary" onClick={()=>onUpdate({stage:nextStage.id})}>
                → {nextStage.label}
              </button>}
              {prevStage&&<button className="btn sm" onClick={()=>onUpdate({stage:prevStage.id})}>
                ← {prevStage.label}
              </button>}
              <button className="btn sm" style={{borderColor:'var(--red)',color:'var(--red)'}}
                onClick={()=>onUpdate({stage:'cancelled'||p.stage})}>취소</button>
            </div>
          </div>
        )}

        {/* 탭 */}
        <div className="tabs">
          {[['info','기본정보'],['units','호기/품목'],['assign','담당자'],['cr','CR'],['notes','노트'],['history','이력']].map(([t,l])=>(
            <button key={t} className={`tab${tab===t?' active':''}`} onClick={()=>setTab(t)}>
              {l}
              {t==='cr'&&(p.crs||[]).length>0&&
                <span style={{marginLeft:4,background:'var(--bg4)',borderRadius:10,fontSize:10,
                  padding:'1px 5px',color:pendingCR.length>0?'var(--amber)':'var(--text3)'}}>
                  {(p.crs||[]).length}
                </span>}
              {t==='notes'&&(p.notes||[]).length>0&&
                <span style={{marginLeft:4,background:'var(--bg4)',borderRadius:10,fontSize:10,
                  padding:'1px 5px',color:'var(--text3)'}}>{(p.notes||[]).length}</span>}
            </button>
          ))}
        </div>

        {/* 기본정보 탭 */}
        {tab==='info'&&(
          editing?(
            <div>
              <div className="grid2">
                <div className="field"><label>프로젝트명</label>
                  <input value={form.name||''} onChange={e=>set('name',e.target.value)}/></div>
                <div className="field"><label>고객사</label>
                  <input value={form.customer||''} onChange={e=>set('customer',e.target.value)}/></div>
                <div className="field"><label>영업 담당자</label>
                  <input value={form.salesPerson||''} onChange={e=>set('salesPerson',e.target.value)}
                    list="edit-member-list"/>
                  <datalist id="edit-member-list">{memberOptions.map(m=><option key={m} value={m}/>)}</datalist>
                </div>
                <div className="field"><label>단계</label>
                  <select value={form.stage} onChange={e=>set('stage',e.target.value)}>
                    {POMS_STAGES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
                  </select>
                </div>
                <div className="field"><label>PO 번호</label>
                  <input value={form.poNumber||''} onChange={e=>set('poNumber',e.target.value)}/></div>
                <div className="field"><label>납기일</label>
                  <input type="date" value={form.deadline||''} onChange={e=>set('deadline',e.target.value)}/></div>
              </div>
              <div className="field"><label>메모</label>
                <textarea value={form.notes_text||p.notes_text||''} onChange={e=>set('notes_text',e.target.value)}/></div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <button className="btn danger sm" onClick={()=>{if(confirm('삭제?'))onDelete()}}>삭제</button>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn ghost" onClick={()=>setEditing(false)}>취소</button>
                  <button className="btn primary" onClick={saveEdit}>저장</button>
                </div>
              </div>
            </div>
          ):(
            <div>
              <div className="grid2" style={{marginBottom:12}}>
                {[
                  ['프로젝트명',p.name],['고객사',p.customer||'—'],
                  ['영업 담당',p.salesPerson||'—'],['PO 번호',p.poNumber||'—'],
                  ['등록일',p.createdAt],['납기일',p.deadline||'—'],
                ].map(([k,v])=>(
                  <div key={k} style={{background:'var(--bg3)',borderRadius:'var(--r)',padding:'8px 10px'}}>
                    <div style={{fontSize:10,color:'var(--text3)',marginBottom:2,textTransform:'uppercase',letterSpacing:'.04em'}}>{k}</div>
                    <div style={{fontSize:13,fontWeight:500}}>{v}</div>
                  </div>
                ))}
              </div>
              {/* 매출 예정일 */}
              {(p.paySchedule||[]).length>0&&(
                <div>
                  <div style={{fontSize:11,color:'var(--text2)',marginBottom:8,fontWeight:600,
                    textTransform:'uppercase',letterSpacing:'.04em'}}>매출 예정일</div>
                  {(p.paySchedule||[]).map(ps=>(
                    <div key={ps.id} style={{display:'flex',alignItems:'center',gap:10,
                      padding:'7px 12px',background:'var(--bg3)',borderRadius:'var(--r)',marginBottom:5}}>
                      <span className="badge" style={{
                        background:ps.type==='선금'?'var(--amber-dim)':ps.type==='잔금'?'var(--green-dim)':'var(--blue-dim)',
                        color:ps.type==='선금'?'var(--amber)':ps.type==='잔금'?'var(--green)':'var(--blue)',
                      }}>{ps.type}</span>
                      <span style={{color:'var(--text2)',fontSize:13}}>{ps.date||'—'}</span>
                      <span style={{marginLeft:'auto',fontWeight:600,color:'var(--green)',
                        fontFamily:"'DM Mono',monospace"}}>₩{(ps.amount||0).toLocaleString()}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )
        )}

        {/* 호기/품목 탭 */}
        {tab==='units'&&(
          <div>
            {editing?(
              <div>
                <div style={{display:'flex',justifyContent:'flex-end',marginBottom:8}}>
                  <button className="btn ghost xs" onClick={addUnit}>+ 호기 추가</button>
                </div>
                {form.units.map(unit=>(
                  <div key={unit.id} style={{background:'var(--bg3)',border:'1px solid var(--border)',
                    borderRadius:'var(--r)',padding:'10px',marginBottom:8}}>
                    <div style={{display:'flex',gap:8,marginBottom:8}}>
                      <input value={unit.name} onChange={e=>setUnit(unit.id,'name',e.target.value)}
                        style={{flex:1,fontWeight:600,fontSize:12}}/>
                      {form.units.length>1&&<button onClick={()=>removeUnit(unit.id)}
                        style={{background:'transparent',border:'none',color:'var(--text3)',cursor:'pointer'}}>×</button>}
                    </div>
                    {unit.items.map(item=>(
                      <div key={item.id} style={{display:'grid',
                        gridTemplateColumns:'1fr 60px 100px 100px 24px',gap:4,marginBottom:4,alignItems:'center'}}>
                        <input value={item.name||''} onChange={e=>setItem(unit.id,item.id,'name',e.target.value)} style={{fontSize:12}}/>
                        <input type="number" value={item.qty||1} onChange={e=>setItem(unit.id,item.id,'qty',Number(e.target.value))} style={{textAlign:'center',fontSize:12}}/>
                        <input type="number" value={item.unitPrice||0} onChange={e=>setItem(unit.id,item.id,'unitPrice',Number(e.target.value))} style={{textAlign:'right',fontSize:12}}/>
                        <div style={{textAlign:'right',fontSize:11,color:'var(--green)',fontFamily:"'DM Mono',monospace"}}>
                          {((item.qty||1)*(item.unitPrice||0)).toLocaleString()}
                        </div>
                        <button onClick={()=>removeItem(unit.id,item.id)}
                          style={{background:'transparent',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:13}}>×</button>
                      </div>
                    ))}
                    <button className="btn ghost xs" style={{width:'100%',justifyContent:'center',marginTop:4}}
                      onClick={()=>addItem(unit.id)}>+ 품목 추가</button>
                  </div>
                ))}
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
                  <span style={{fontSize:13,color:'var(--text2)'}}>합계</span>
                  <span style={{fontWeight:700,color:'var(--green)',fontFamily:"'DM Mono',monospace"}}>₩{formTotal.toLocaleString()}</span>
                </div>
                {/* 매출예정일 편집 */}
                <div style={{marginBottom:12}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                    <label style={{margin:0}}>매출 예정일</label>
                    <button className="btn ghost xs" onClick={addPay}>+ 추가</button>
                  </div>
                  {form.paySchedule.map(ps=>(
                    <div key={ps.id} style={{display:'grid',gridTemplateColumns:'80px 1fr 130px 24px',gap:6,marginBottom:6,alignItems:'center'}}>
                      <select value={ps.type||'선금'} onChange={e=>setPay(ps.id,'type',e.target.value)} style={{fontSize:12}}>
                        {['선금','중도금','잔금','일시불','기타'].map(t=><option key={t}>{t}</option>)}
                      </select>
                      <input type="date" value={ps.date||''} onChange={e=>setPay(ps.id,'date',e.target.value)}/>
                      <input type="number" value={ps.amount||0} onChange={e=>setPay(ps.id,'amount',Number(e.target.value))} style={{textAlign:'right'}}/>
                      <button onClick={()=>removePay(ps.id)} style={{background:'transparent',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:14}}>×</button>
                    </div>
                  ))}
                </div>
                <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                  <button className="btn ghost" onClick={()=>setEditing(false)}>취소</button>
                  <button className="btn primary" onClick={saveEdit}>저장</button>
                </div>
              </div>
            ):(
              <div>
                {(p.units||[]).map(unit=>{
                  const uTotal=unit.items.reduce((a,i)=>a+(i.qty||1)*(i.unitPrice||0),0);
                  return(
                    <div key={unit.id} style={{background:'var(--bg3)',border:'1px solid var(--border)',
                      borderRadius:'var(--r)',padding:'12px',marginBottom:8}}>
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                        <span style={{fontWeight:600,fontSize:13}}>{unit.name}</span>
                        <span style={{color:'var(--green)',fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:600}}>
                          ₩{uTotal.toLocaleString()}
                        </span>
                      </div>
                      {unit.items.filter(i=>i.name||i.unitPrice>0).map(item=>(
                        <div key={item.id} style={{display:'grid',gridTemplateColumns:'1fr 50px 110px 110px',
                          gap:8,fontSize:12,padding:'4px 0',borderBottom:'1px solid var(--border)'}}>
                          <span>{item.name||'—'}</span>
                          <span style={{textAlign:'center',color:'var(--text2)'}}>{item.qty||1}</span>
                          <span style={{textAlign:'right',color:'var(--text2)',fontFamily:"'DM Mono',monospace"}}>
                            {(item.unitPrice||0).toLocaleString()}
                          </span>
                          <span style={{textAlign:'right',fontWeight:600,color:'var(--green)',fontFamily:"'DM Mono',monospace"}}>
                            {((item.qty||1)*(item.unitPrice||0)).toLocaleString()}
                          </span>
                        </div>
                      ))}
                    </div>
                  );
                })}
                <div style={{display:'flex',justifyContent:'flex-end',gap:10,padding:'8px 0',fontSize:13}}>
                  <span style={{color:'var(--text2)'}}>총 합계</span>
                  <span style={{fontWeight:700,color:'var(--green)',fontFamily:"'DM Mono',monospace"}}>₩{amt.toLocaleString()}</span>
                </div>
              </div>
            )}
          </div>
        )}

        {/* 담당자 배정 탭 */}
        {tab==='assign'&&(
          <div>
            <div style={{fontSize:12,color:'var(--text2)',marginBottom:14,lineHeight:1.6}}>
              각 단계별 담당자를 배정하세요. 단계 진입 시 담당자에게 알림이 발송됩니다.
            </div>
            {POMS_STAGES.map(stage=>{
              const pc2=phaseColor(stage.phase);
              const current=(p.assignments||{})[stage.id]||'';
              return(
                <div key={stage.id} style={{display:'flex',alignItems:'center',gap:10,
                  padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                  <span className="badge" style={{background:pc2+'18',color:pc2,border:`1px solid ${pc2}30`,
                    fontSize:10,width:130,justifyContent:'center'}}>{stage.label}</span>
                  <span style={{fontSize:10,color:'var(--text3)',flex:1}}>{stage.owner} 주도</span>
                  <input value={current}
                    onChange={e=>onUpdate({assignments:{...(p.assignments||{}),[stage.id]:e.target.value}})}
                    list={`assign-list-${stage.id}`}
                    style={{width:140,fontSize:12}} placeholder="담당자 이름"/>
                  <datalist id={`assign-list-${stage.id}`}>
                    {memberOptions.map(m=><option key={m} value={m}/>)}
                  </datalist>
                </div>
              );
            })}
          </div>
        )}

        {/* CR 탭 */}
        {tab==='cr'&&(
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{fontSize:12,color:'var(--text2)'}}>
                Spec. Freeze 이후 발생한 변경 요청을 관리합니다
              </div>
              <button className="btn sm" style={{borderColor:'var(--red)',color:'var(--red)'}}
                onClick={()=>setShowCrForm(!showCrForm)}>+ CR 접수</button>
            </div>

            {showCrForm&&(
              <div style={{background:'var(--red-dim)',border:'1px solid #ff475740',
                borderRadius:'var(--r)',padding:'12px',marginBottom:12}}>
                <div style={{fontSize:12,fontWeight:600,color:'var(--red)',marginBottom:8}}>새 CR 접수</div>
                <div className="field"><label>변경 내용 *</label>
                  <input value={crForm.title} onChange={e=>setCrForm(p=>({...p,title:e.target.value}))}
                    placeholder="변경 요청 요약"/></div>
                <div className="field"><label>상세 설명</label>
                  <textarea value={crForm.desc} onChange={e=>setCrForm(p=>({...p,desc:e.target.value}))}

                        {CR_STATUSES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}

                    </div>
                    {cr.desc&&<div style={{fontSize:12,color:'var(--text2)',marginBottom:4,lineHeight:1.5}}>{cr.desc}</div>}
                    {cr.impact&&(
                      <div style={{fontSize:11,background:'var(--amber-dim)',color:'var(--amber)',
                        padding:'3px 8px',borderRadius:3,display:'inline-block'}}>⚠ {cr.impact}</div>
                    )}
                    <div style={{fontSize:10,color:'var(--text3)',marginTop:6}}>{cr.date}</div>

            {(p.crs||[]).length>=3&&(
              <div style={{background:'var(--red-dim)',border:'1px solid #ff475740',borderRadius:'var(--r)',

              </div>
            )}

        {/* 노트 탭 */}
        {tab==='notes'&&(
          <div>
            <div style={{display:'flex',gap:8,marginBottom:14}}>
              <textarea value={noteText} onChange={e=>setNoteText(e.target.value)}
                style={{flex:1,minHeight:72}}
                placeholder="활동 내용, 미팅 메모, 다음 액션 등..."
                onKeyDown={e=>e.key==='Enter'&&e.ctrlKey&&addNote()}/>
              <div style={{display:'flex',flexDirection:'column',gap:4}}>
                <button className="btn primary sm" disabled={!noteText.trim()} onClick={addNote}>추가</button>
                <span style={{fontSize:9,color:'var(--text3)',textAlign:'center'}}>Ctrl+↵</span>
              </div>
            </div>
            {(p.notes||[]).length===0
              ?<div style={{color:'var(--text3)',fontSize:13,padding:'16px',textAlign:'center'}}>노트 없음</div>
              :[...(p.notes||[])].reverse().map(n=>(
                <div key={n.id} style={{background:'var(--bg3)',borderRadius:'var(--r)',
                  padding:'10px 12px',marginBottom:8,position:'relative'}}>
                  <div style={{fontSize:10,color:'var(--text3)',marginBottom:5}}>{n.date}</div>
                  <div style={{fontSize:13,lineHeight:1.6,whiteSpace:'pre-wrap'}}>{n.text}</div>
                  <button onClick={()=>deleteNote(n.id)}
                    style={{position:'absolute',top:8,right:8,background:'transparent',border:'none',
                      color:'var(--text3)',cursor:'pointer',fontSize:13,padding:'2px 6px'}}>×</button>
                </div>
              ))}
          </div>
        )}

        {/* 이력 탭 */}
        {tab==='history'&&(
          <div>
            {(p.history||[]).length===0
              ?<div style={{color:'var(--text3)',fontSize:13}}>단계 변경 이력 없음</div>
              :[...(p.history||[])].reverse().map((h,i)=>{
                const fc=phaseColor(stageInfo(h.from).phase);
                const tc=phaseColor(stageInfo(h.to).phase);
                return(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:10,
                    padding:'8px 0',borderBottom:'1px solid var(--border)',fontSize:13}}>
                    <span style={{fontSize:11,color:'var(--text3)',width:100,flexShrink:0}}>{h.date}</span>
                    <span className="badge" style={{background:fc+'18',color:fc,border:`1px solid ${fc}30`}}>{stageInfo(h.from).label}</span>
                    <span style={{color:'var(--text3)'}}>→</span>
                    <span className="badge" style={{background:tc+'18',color:tc,border:`1px solid ${tc}30`}}>{stageInfo(h.to).label}</span>
                    {h.note&&<span style={{fontSize:11,color:'var(--text3)'}}>{h.note}</span>}
                  </div>
                );
              })}
          </div>
        )}
      </div>
    </div>
  );
}
